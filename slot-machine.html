<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>슬롯머신 - My Toys</title>
    <meta name="description" content="Fallout 스타일의 레트로 슬롯머신 게임. 체리, 7, BAR, 벨, 과일 심볼로 잭팟을 노려보세요!">
    <meta name="keywords" content="슬롯머신, 슬롯게임, 온라인슬롯, 카지노게임, 레트로게임">
    <meta name="robots" content="index, follow">
    <meta name="author" content="My Toys">
    <meta property="og:type" content="website">
    <meta property="og:title" content="슬롯머신 - My Toys">
    <meta property="og:description" content="Fallout 스타일의 레트로 슬롯머신 게임">
    <meta property="og:locale" content="ko_KR">
    <meta property="og:site_name" content="My Toys">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="슬롯머신 - My Toys">
    <meta name="twitter:description" content="Fallout 스타일의 레트로 슬롯머신 게임">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --sym-h: 80px;
            --chrome-hi: #f4f4f4;
            --chrome-mid: #c8c8c8;
            --chrome-lo: #909090;
            --gold-hi: #f8e060;
            --gold-mid: #c8980c;
            --gold-lo: #7a5a00;
            --panel-bg: #0c0c0c;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background:
                radial-gradient(ellipse at 50% 0%, #484848 0%, #282828 40%, #101010 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Oswald', sans-serif;
            color: #222;
            padding: 16px;
        }

        /* ─── Machine body — ribbed chrome ───────── */
        .machine {
            width: 100%;
            max-width: 520px;
            /* Layered: horizontal ribs over chrome gradient */
            background-color: #c0c0c0;
            background-image:
                repeating-linear-gradient(
                    180deg,
                    transparent           0px,
                    rgba(255,255,255,.13) 1px,
                    rgba(0,0,0,.09)       2.5px,
                    transparent           4px
                ),
                linear-gradient(170deg,
                    #ffffff 0%,
                    #ebebeb 7%,
                    #d0d0d0 18%,
                    #b4b4b4 36%,
                    #cccccc 52%,
                    #b8b8b8 68%,
                    #a0a0a0 84%,
                    #b0b0b0 100%);
            border: 2px solid #686868;
            border-radius: 10px 10px 6px 6px;
            box-shadow:
                inset 6px 0 14px rgba(255,255,255,.75),
                inset -6px 0 14px rgba(0,0,0,.28),
                inset 0 5px 10px rgba(255,255,255,.55),
                0 0 0 1px rgba(0,0,0,.4),
                0 14px 60px rgba(0,0,0,.9),
                0 30px 100px rgba(0,0,0,.5);
            position: relative;
            overflow: visible;
        }

        /* ─── Gold trim bands ──────────────────────── */
        .trim-top, .trim-bot {
            height: 10px;
            background-image:
                repeating-linear-gradient(
                    90deg,
                    rgba(255,255,255,.18) 0px,
                    rgba(255,255,255,.06) 2px,
                    rgba(0,0,0,.12) 4px,
                    transparent 6px
                ),
                linear-gradient(180deg,
                    #fff8b0 0%,
                    #f0d050 18%,
                    #c89010 42%,
                    #e8c028 62%,
                    #a07010 82%,
                    #c8a020 100%);
            border-top: 1px solid rgba(255,255,255,.65);
            border-bottom: 1px solid rgba(0,0,0,.35);
        }
        .trim-top { border-radius: 9px 9px 0 0; }
        .trim-bot { border-radius: 0 0 5px 5px; }

        /* ─── Header — protrudes forward ──────────── */
        .machine-header {
            padding: 12px 20px 10px;
            text-align: center;
            background: linear-gradient(180deg, #1e1e1e 0%, #0a0a0a 100%);
            border-bottom: 5px solid var(--gold-mid);
            position: relative;
            z-index: 4;
            /* Cast shadow down onto reel section — protrusion effect */
            box-shadow:
                0 10px 32px rgba(0,0,0,.98),
                0 4px 12px rgba(0,0,0,.75),
                inset 0 1px 0 rgba(255,255,255,.08);
            /* Chrome rib strip along bottom edge */
        }
        .machine-header::after {
            content: '';
            position: absolute;
            bottom: -9px; left: 0; right: 0;
            height: 5px;
            background-image:
                repeating-linear-gradient(
                    90deg,
                    rgba(255,255,255,.4) 0px,
                    rgba(255,255,255,.1) 2px,
                    rgba(0,0,0,.2) 4px,
                    transparent 6px
                ),
                linear-gradient(180deg, #d8d4c0, #a09070);
            z-index: 5;
        }
        .machine-title {
            font-family: 'Oswald', sans-serif;
            font-weight: 700;
            font-size: 1.7rem;
            letter-spacing: 0.22em;
            color: var(--gold-hi);
            text-shadow:
                0 0 18px rgba(248,224,96,.75),
                0 2px 0 #000,
                0 -1px 0 rgba(255,240,100,.35);
            text-transform: uppercase;
        }
        .machine-subtitle {
            font-size: 0.58rem;
            letter-spacing: 0.38em;
            color: #5a5a5a;
            margin-top: 3px;
            text-transform: uppercase;
        }
        .trim-line {
            height: 2px;
            margin: 6px 12% 0;
            background: linear-gradient(90deg, transparent, var(--gold-mid), transparent);
        }

        /* ─── Reel section — recessed panel + chrome sides ── */
        .reel-section {
            display: flex;
            align-items: stretch;
            padding: 16px 20% 16px 20%;
            gap: 8px;
            position: relative;
            z-index: 2;
            background: #050505;
            border-top: 3px solid #806808;
            border-bottom: 3px solid #806808;
            /* Shadow from overhanging header */
            box-shadow: inset 0 8px 24px rgba(0,0,0,.95), inset 0 -6px 16px rgba(0,0,0,.7);
            overflow: hidden;
        }

        /* Convex-top → concave-mid chrome side columns */
        .reel-section::before,
        .reel-section::after {
            content: '';
            position: absolute;
            top: 0; bottom: 0;
            width: 20%;
            z-index: 1;
            pointer-events: none;
        }
        .reel-section::before {
            left: 0;
            background-image:
                /* Convex highlight upper / concave shadow lower */
                radial-gradient(ellipse 220% 48% at 60% 28%, rgba(255,255,255,.42) 0%, transparent 55%),
                radial-gradient(ellipse 220% 44% at 40% 68%, rgba(0,0,0,.60) 0%, transparent 52%),
                /* Horizontal ribs */
                repeating-linear-gradient(
                    180deg,
                    rgba(255,255,255,.10) 0px,
                    rgba(255,255,255,.04) 1px,
                    rgba(0,0,0,.08) 2.5px,
                    transparent 4px
                ),
                /* Base S-curve chrome tone */
                linear-gradient(180deg,
                    #e0ddd8 0%, #eeebe6 12%, #c8c5c0 28%,
                    #787470 46%, #646060 56%,
                    #808078 68%, #989490 82%, #aeaaa6 100%);
            box-shadow: inset -3px 0 10px rgba(0,0,0,.55), inset 1px 0 5px rgba(255,255,255,.25);
        }
        .reel-section::after {
            right: 0;
            background-image:
                radial-gradient(ellipse 220% 48% at 40% 28%, rgba(255,255,255,.34) 0%, transparent 55%),
                radial-gradient(ellipse 220% 44% at 60% 68%, rgba(0,0,0,.55) 0%, transparent 52%),
                repeating-linear-gradient(
                    180deg,
                    rgba(255,255,255,.08) 0px,
                    rgba(255,255,255,.03) 1px,
                    rgba(0,0,0,.08) 2.5px,
                    transparent 4px
                ),
                linear-gradient(180deg,
                    #d4d1cc 0%, #e2dfd8 12%, #bcb9b4 28%,
                    #6c6864 46%, #585450 56%,
                    #74706c 68%, #8c8884 82%, #a0a09c 100%);
            box-shadow: inset 3px 0 10px rgba(0,0,0,.55), inset -1px 0 5px rgba(255,255,255,.18);
        }

        /* ─── Reels container ──────────────────────── */
        .reels-wrap {
            flex: 1;
            position: relative;
        }
        .reel-frame {
            background: #f5f0e8;
            /* Thick beveled chrome border — like the real machine bezel */
            border-style: solid;
            border-width: 8px;
            border-color: #e8e8e8 #787878 #606060 #d0d0d0;
            border-radius: 3px;
            overflow: hidden;
            position: relative;
            z-index: 2;
            box-shadow:
                /* Deep recess shadow */
                inset 0 6px 18px rgba(0,0,0,.65),
                inset 0 -4px 12px rgba(0,0,0,.45),
                inset 4px 0 10px rgba(0,0,0,.3),
                inset -4px 0 10px rgba(0,0,0,.3),
                /* Outer chrome edge glow */
                0 0 0 1px rgba(255,255,255,.2),
                0 6px 20px rgba(0,0,0,.9);
        }
        .reel-frame::before,
        .reel-frame::after {
            content: '';
            position: absolute;
            left: 0; right: 0;
            height: 34px;
            z-index: 10;
            pointer-events: none;
        }
        .reel-frame::before {
            top: 0;
            background: linear-gradient(to bottom, rgba(0,0,0,.6) 0%, transparent 100%);
        }
        .reel-frame::after {
            bottom: 0;
            background: linear-gradient(to top, rgba(0,0,0,.6) 0%, transparent 100%);
        }

        /* Payline — red center line */
        .payline {
            position: absolute;
            left: -8px; right: -8px;
            top: 50%;
            transform: translateY(-50%);
            height: 4px;
            background: rgba(210,20,20,.75);
            box-shadow: 0 0 8px rgba(220,30,30,.5);
            z-index: 20;
            pointer-events: none;
            border-radius: 2px;
        }
        .payline::before, .payline::after {
            content: '▶';
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            font-size: 0.68rem;
            color: rgba(220,30,30,.9);
        }
        .payline::before { left: -15px; }
        .payline::after  { right: -15px; transform: translateY(-50%) scaleX(-1); }

        /* ─── Reel inner ───────────────────────────── */
        .reels-inner {
            display: flex;
            height: calc(var(--sym-h) * 3);
        }
        .reel-col {
            flex: 1;
            overflow: hidden;
            position: relative;
            border-right: 1px solid #d8d4cc;
        }
        .reel-col:last-child { border-right: none; }
        .reel-strip {
            display: flex;
            flex-direction: column;
            will-change: transform;
        }

        /* Symbol cell */
        .sym-cell {
            height: var(--sym-h);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.4rem;
            flex-shrink: 0;
            background: #f8f4ec;
            border-bottom: 1px solid #e4dece;
            user-select: none;
        }
        .bar-img {
            width: 74%;
            height: auto;
            display: block;
            pointer-events: none;
            user-select: none;
        }

        /* Win highlight */
        .reel-col.win-hl .sym-cell { background: #fffce0; }

        /* ─── Lever — chrome shaft + black ball ────── */
        .lever-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 0 6px;
            cursor: grab;
            user-select: none;
            touch-action: none;
            position: relative;
            flex-shrink: 0;
        }
        .lever-area:active { cursor: grabbing; }
        .lever-shaft {
            width: 11px;
            height: 100%;
            /* Ribbed chrome rod */
            background-image:
                repeating-linear-gradient(
                    180deg,
                    rgba(255,255,255,.2) 0px,
                    transparent 2px,
                    rgba(0,0,0,.15) 4px,
                    transparent 6px
                ),
                linear-gradient(90deg,
                    #383838 0%, #f0f0f0 28%, #ffffff 46%, #e0e0e0 58%, #383838 100%);
            border-radius: 5px;
            position: relative;
            box-shadow: 3px 3px 10px rgba(0,0,0,.8), -1px 0 4px rgba(255,255,255,.3);
        }
        .lever-ball {
            width: 38px;
            height: 38px;
            /* Polished chrome ball — bright specular highlight */
            background: radial-gradient(circle at 34% 28%,
                #ffffff 0%, #d8d8d8 18%, #a0a0a0 42%, #404040 70%, #101010 100%);
            border-radius: 50%;
            border: 1px solid #282828;
            box-shadow:
                0 6px 18px rgba(0,0,0,.98),
                inset 3px 3px 7px rgba(255,255,255,.5),
                inset -3px -3px 6px rgba(0,0,0,.7);
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            top: 8px;
        }
        .lever-base {
            width: 26px;
            height: 16px;
            background-image:
                repeating-linear-gradient(
                    90deg,
                    rgba(255,255,255,.25) 0px,
                    transparent 2px,
                    rgba(0,0,0,.12) 4px,
                    transparent 6px
                ),
                linear-gradient(180deg, #c8c8c8, #585858);
            border-radius: 4px;
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            box-shadow: 0 3px 8px rgba(0,0,0,.7);
            border: 1px solid #282828;
        }

        /* ─── Footer — flat chrome control shelf ────── */
        .machine-footer {
            /* Chrome ribbed panel — flat (not angled) */
            background-image:
                repeating-linear-gradient(
                    180deg,
                    rgba(255,255,255,.14) 0px,
                    rgba(255,255,255,.05) 1.5px,
                    rgba(0,0,0,.10) 3px,
                    transparent 5px
                ),
                linear-gradient(180deg,
                    #c0bcb8 0%, #d4d0cc 12%, #b8b4b0 30%,
                    #a8a4a0 60%, #bcb8b4 80%, #c4c0bc 100%);
            padding: 0 16px 12px;
            position: relative;
            z-index: 3;
        }

        /* Grand prize divider */
        .grand-prize {
            text-align: center;
            padding: 7px 0 7px;
            position: relative;
        }
        .grand-prize::before, .grand-prize::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 30%;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(0,0,0,.35));
        }
        .grand-prize::before { left: 2%; }
        .grand-prize::after  { right: 2%; background: linear-gradient(90deg, rgba(0,0,0,.35), transparent); }
        .grand-prize span {
            font-size: 0.65rem;
            letter-spacing: 0.38em;
            color: rgba(0,0,0,.5);
            text-transform: uppercase;
        }

        /* LCD display */
        .lcd-row {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
        }
        .lcd-panel {
            flex: 1;
            background: #050e05;
            border: 1px solid #1e3a1e;
            border-radius: 3px;
            padding: 7px 10px;
            font-family: 'Share Tech Mono', monospace;
            box-shadow: inset 0 0 8px rgba(0,0,0,.5), 0 0 6px rgba(80,160,80,.12);
        }
        .lcd-label {
            font-size: 0.56rem;
            color: #3a6a3a;
            letter-spacing: 0.08em;
            margin-bottom: 1px;
        }
        .lcd-value {
            font-size: 1rem;
            color: #7cfc00;
            text-shadow: 0 0 8px rgba(124,252,0,.7);
            letter-spacing: 0.04em;
        }

        /* Result message */
        #result-msg {
            text-align: center;
            min-height: 1.6em;
            font-size: 1rem;
            font-weight: 600;
            letter-spacing: 0.05em;
            color: #1a1a1a;
            text-shadow: 0 1px 0 rgba(255,255,255,.45);
            margin-bottom: 10px;
        }

        /* Controls */
        .controls {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .ctrl-btn {
            flex: 1;
            background: linear-gradient(170deg, #d8d8d8, #a8a8a8 55%, #bcbcbc);
            border: 1px solid #707070;
            border-radius: 4px;
            color: #1a1a1a;
            font-family: 'Oswald', sans-serif;
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 0.04em;
            cursor: pointer;
            padding: 9px 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,.4), inset 0 1px 0 rgba(255,255,255,.7);
            transition: background .1s, transform .1s;
            white-space: nowrap;
        }
        .ctrl-btn:hover:not(:disabled) {
            background: linear-gradient(170deg, #ececec, #c0c0c0 55%, #d4d4d4);
            color: #000;
        }
        .ctrl-btn:active:not(:disabled) {
            transform: translateY(1px);
            box-shadow: 0 1px 3px rgba(0,0,0,.4), inset 0 1px 0 rgba(255,255,255,.4);
        }
        .ctrl-btn:disabled { opacity: .38; cursor: not-allowed; }
        .ctrl-btn.spin-btn {
            flex: 2;
            background: linear-gradient(170deg, #cc2424, #8c1414);
            border-color: #a01818;
            color: #fff;
            font-size: 0.95rem;
            padding: 10px 4px;
            text-shadow: 0 1px 3px rgba(0,0,0,.5);
            box-shadow: 0 3px 10px rgba(0,0,0,.45), inset 0 1px 0 rgba(255,255,255,.18);
        }
        .ctrl-btn.spin-btn:hover:not(:disabled) {
            background: linear-gradient(170deg, #dd3232, #a41c1c);
        }
        .ctrl-btn .key {
            font-size: 0.56rem;
            color: #555;
            margin-left: 4px;
        }
        .ctrl-btn.spin-btn .key { color: rgba(255,255,255,.45); }

        /* Good luck strip */
        .good-luck {
            text-align: center;
            padding: 6px 0 0;
            font-size: 0.6rem;
            letter-spacing: 0.4em;
            color: rgba(0,0,0,.4);
            text-shadow: 0 1px 0 rgba(255,255,255,.5);
        }

        /* ─── Ornate brand panel ────────────────────── */
        .brand-panel {
            background: linear-gradient(180deg, #18226a 0%, #0d1848 50%, #1a2870 100%);
            border-top: 3px solid var(--gold-mid);
            border-bottom: 3px solid var(--gold-mid);
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            position: relative;
            overflow: hidden;
        }
        .brand-panel::before {
            content: '';
            position: absolute;
            inset: 0;
            background:
                radial-gradient(ellipse at 50% 0%, rgba(200,152,12,.18) 0%, transparent 65%),
                radial-gradient(ellipse at 50% 100%, rgba(200,152,12,.10) 0%, transparent 55%);
        }
        .brand-coin {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: radial-gradient(circle at 38% 32%,
                #fff4a0 0%, var(--gold-hi) 35%, var(--gold-mid) 65%, var(--gold-lo) 100%);
            border: 2px solid #a07808;
            box-shadow: 0 2px 6px rgba(0,0,0,.5), inset 1px 1px 2px rgba(255,255,255,.5);
            flex-shrink: 0;
        }
        .brand-name {
            font-family: 'Oswald', sans-serif;
            font-weight: 700;
            font-size: 1.55rem;
            letter-spacing: 0.28em;
            color: var(--gold-hi);
            text-shadow:
                0 0 22px rgba(248,224,96,.65),
                2px 2px 4px rgba(0,0,0,.8),
                0 -1px 0 rgba(255,240,100,.3);
            text-transform: uppercase;
            position: relative;
        }
        .brand-scroll {
            font-size: 1.0rem;
            color: var(--gold-mid);
            opacity: 0.9;
            flex-shrink: 0;
            position: relative;
        }

        /* ─── Paytable Modal ───────────────────────── */
        #paytable-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,.87);
            z-index: 100;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }
        #paytable-overlay.open { display: flex; }
        .paytable-box {
            background: #f0ebe0;
            border: 3px solid #8b1a1a;
            border-radius: 6px;
            padding: 20px;
            max-width: 340px;
            width: 100%;
            color: #222;
            box-shadow: 0 0 50px rgba(0,0,0,.9);
        }
        .paytable-title {
            font-family: 'Oswald', sans-serif;
            font-weight: 700;
            font-size: 1rem;
            letter-spacing: 0.25em;
            text-align: center;
            color: #8b1a1a;
            margin-bottom: 14px;
            border-bottom: 1px solid #c8a898;
            padding-bottom: 8px;
        }
        .pt-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 5px 4px;
            border-bottom: 1px solid #ddd4c4;
            font-size: 0.85rem;
        }
        .pt-row:last-child { border-bottom: none; }
        .pt-syms { font-size: 1.15rem; letter-spacing: 0.08em; }
        .pt-mult { font-weight: 700; color: #8b1a1a; font-family: 'Share Tech Mono', monospace; }
        .pt-bar { font-family: 'Oswald', sans-serif; font-weight: 700; font-size: 0.75rem;
                  background: #333; color: #fff; padding: 1px 5px; border-radius: 2px; border: 1px solid #666; }
        .paytable-close {
            margin-top: 14px;
            width: 100%;
            background: #8b1a1a;
            border: none;
            border-radius: 4px;
            color: #f5e8d0;
            font-family: 'Oswald', sans-serif;
            font-weight: 600;
            font-size: 0.9rem;
            letter-spacing: 0.1em;
            padding: 9px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Back link */
        .back-link {
            display: block;
            text-align: center;
            margin-top: 16px;
            font-size: 0.7rem;
            color: #888;
            text-decoration: none;
            letter-spacing: 0.1em;
        }
        .back-link:hover { color: #ccc; }

        /* ─── Mobile tweaks ────────────────────────── */
        @media (max-width: 400px) {
            :root { --sym-h: 66px; }
            .machine-title { font-size: 1.35rem; }
            .brand-name { font-size: 1.3rem; }
            .ctrl-btn { font-size: 0.74rem; padding: 8px 2px; }
            .ctrl-btn .key { display: none; }
        }
        @media (max-width: 320px) {
            :root { --sym-h: 58px; }
            .reel-section { padding: 10px 15% 10px 15%; gap: 5px; }
            .lever-shaft { width: 8px; }
            .lever-ball { width: 26px; height: 26px; }
            .machine-title { font-size: 1.1rem; letter-spacing: 0.15em; }
            .machine-subtitle { font-size: 0.46rem; }
            .brand-name { font-size: 1.1rem; letter-spacing: 0.2em; }
        }
        @media (min-width: 560px) {
            :root { --sym-h: 90px; }
        }
    </style>
</head>
<body>

<div style="width:100%;max-width:520px;">

<!-- ══════════ MACHINE ══════════ -->
<div class="machine">

<a href="index.html" class="back-link">← My Toys 홈으로</a>

<!-- ══════════ PAYTABLE MODAL ══════════ -->
<div id="paytable-overlay">
    <div class="paytable-box">
        <div class="paytable-title">★ 배당 목록 ★</div>
        <div class="pt-row"><span class="pt-syms">🔔🔔🔔</span><span class="pt-mult">BET × 10</span></div>
        <div class="pt-row"><span class="pt-syms"><span class="pt-bar">BAR</span>&nbsp;<span class="pt-bar">BAR</span>&nbsp;<span class="pt-bar">BAR</span></span><span class="pt-mult">BET × 20</span></div>
        <div class="pt-row"><span class="pt-syms">7️⃣7️⃣7️⃣</span><span class="pt-mult">BET × 30</span></div>
        <div class="pt-row"><span class="pt-syms">🍇🍇🍇</span><span class="pt-mult">BET × 40</span></div>
        <div class="pt-row"><span class="pt-syms">🍑🍑🍑</span><span class="pt-mult">BET × 60</span></div>
        <div class="pt-row"><span class="pt-syms">🍊🍊🍊</span><span class="pt-mult">BET × 100</span></div>
        <div class="pt-row" style="background:#fffbe8"><span class="pt-syms">🍒──</span><span class="pt-mult">BET × 2</span></div>
        <div class="pt-row" style="background:#fffbe8"><span class="pt-syms">🍒🍒─</span><span class="pt-mult">BET × 5</span></div>
        <div class="pt-row" style="background:#fffbe8"><span class="pt-syms">🍒🍒🍒</span><span class="pt-mult">BET × 10</span></div>
        <button class="paytable-close" id="btn-pay-close">닫기</button>
    </div>
</div>

<script>
// ════════════════════════════════════════════
//   CONSTANTS
// ════════════════════════════════════════════
const SYMBOLS  = ['🔔', 'BAR', '7️⃣', '🍇', '🍑', '🍊', '🍒'];
// Weights: cherry is most common, orange least
const WEIGHTS  = [12,   10,    8,    14,   10,   6,    40];
const STRIP_N  = 24;   // unique symbols per reel
const SPIN_SPEED = 14; // px per frame during spin (~840px/s at 60fps)
const BET_STEPS  = [1,5,10,25,50,100,250,500,1000];
const INIT_CHIPS = 10000;

// ════════════════════════════════════════════
//   STATE
// ════════════════════════════════════════════
let chips     = INIT_CHIPS;
let earned    = 0;
let betIdx    = 3;  // index into BET_STEPS → 25
let spinning  = false;

// Lever drag state
const LEVER_BALL_INIT_TOP  = 8;
const LEVER_SNAP_THRESHOLD = 0.75; // 75% pull triggers auto-spin
let leverBallTop          = LEVER_BALL_INIT_TOP;
let leverDragging         = false;
let leverDragStartY       = 0;
let leverDragStartBallTop = LEVER_BALL_INIT_TOP;
let leverSpringAnim       = null;
let leverAutoCompleted    = false;

const reels = [
    { symbols: [], offset: 0, animId: null, isSpinning: false, stopAnim: null },
    { symbols: [], offset: 0, animId: null, isSpinning: false, stopAnim: null },
    { symbols: [], offset: 0, animId: null, isSpinning: false, stopAnim: null },
];

// ════════════════════════════════════════════
//   HELPERS
// ════════════════════════════════════════════
function getBet()    { return BET_STEPS[betIdx]; }
function symH()      { return parseInt(getComputedStyle(document.documentElement).getPropertyValue('--sym-h')) || 80; }
function sleep(ms)   { return new Promise(r => setTimeout(r, ms)); }

function weightedRandom() {
    const total = WEIGHTS.reduce((a,b) => a+b, 0);
    let r = Math.random() * total;
    for (let i = 0; i < SYMBOLS.length; i++) {
        r -= WEIGHTS[i];
        if (r <= 0) return SYMBOLS[i];
    }
    return SYMBOLS[SYMBOLS.length - 1];
}

function makeCell(sym) {
    const div = document.createElement('div');
    div.className = 'sym-cell';
    if (sym === 'BAR') {
        const img = document.createElement('img');
        img.src = 'bar.svg';
        img.className = 'bar-img';
        img.alt = 'BAR';
        img.draggable = false;
        div.appendChild(img);
    } else {
        div.textContent = sym;
    }
    return div;
}

function updateDisplays() {
    document.getElementById('disp-bet').textContent   = getBet().toLocaleString();
    document.getElementById('disp-chips').textContent = chips.toLocaleString();
    document.getElementById('disp-earn').textContent  = earned.toLocaleString();
}

// ════════════════════════════════════════════
//   REEL BUILD
// ════════════════════════════════════════════
function buildStrip(ri) {
    const r     = reels[ri];
    const strip = document.getElementById('strip-' + ri);
    strip.innerHTML = '';
    r.symbols = [];

    // Generate N unique symbols with enough cherries (at least 4)
    for (let i = 0; i < STRIP_N; i++) r.symbols.push(weightedRandom());

    // Ensure at least 4 cherries in the strip for stopping reliability
    const cherryCount = r.symbols.filter(s => s === '🍒').length;
    if (cherryCount < 4) {
        const needed = 4 - cherryCount;
        const noncherryIdx = r.symbols
            .map((s, i) => s !== '🍒' ? i : -1)
            .filter(i => i >= 0);
        for (let k = 0; k < needed && k < noncherryIdx.length; k++) {
            const pick = noncherryIdx[Math.floor(Math.random() * noncherryIdx.length)];
            r.symbols[pick] = '🍒';
        }
    }

    // Render 3 copies for safe infinite-scroll target range
    for (let pass = 0; pass < 3; pass++) {
        for (const sym of r.symbols) strip.appendChild(makeCell(sym));
    }

    r.offset = 0;
    strip.style.transform = 'translateY(0px)';
}

function initReels() {
    for (let ri = 0; ri < 3; ri++) {
        buildStrip(ri);
        // Position to center of strip (showing symbols 1,2,3)
        const strip = document.getElementById('strip-' + ri);
        reels[ri].offset = 0;
        strip.style.transform = 'translateY(0px)';
    }
}

// ════════════════════════════════════════════
//   SPIN LOOP (rAF infinite)
// ════════════════════════════════════════════
function startReelSpin(ri) {
    const r = reels[ri];
    const H     = symH();
    const halfH = STRIP_N * H;

    // ── KEY FIX ──────────────────────────────────────────────────────────────
    // element.animate() with fill:'forwards' stays active in the CSS cascade
    // at HIGHER priority than inline styles, overriding every rAF transform set.
    // Cancelling it removes the fill effect so our inline style takes over.
    if (r.stopAnim) {
        r.stopAnim.cancel();   // clears fill:'forwards' override
        r.stopAnim = null;
    }
    // ─────────────────────────────────────────────────────────────────────────

    // Normalize offset into (-halfH, 0] — visually seamless (3 identical copies)
    r.offset = r.offset % halfH;   // JS % keeps sign → result in (-halfH, 0]
    document.getElementById('strip-' + ri).style.transform =
        'translateY(' + r.offset + 'px)';

    r.isSpinning = true;

    function tick() {
        if (!r.isSpinning) return;

        r.offset -= SPIN_SPEED;
        if (r.offset <= -halfH) r.offset += halfH;   // seamless wrap

        document.getElementById('strip-' + ri).style.transform =
            'translateY(' + r.offset + 'px)';

        r.animId = requestAnimationFrame(tick);
    }
    r.animId = requestAnimationFrame(tick);
}

// ════════════════════════════════════════════
//   STOP REEL
// ════════════════════════════════════════════
function stopReel(ri, targetSym) {
    return new Promise(resolve => {
        const r     = reels[ri];
        const H     = symH();
        const halfH = STRIP_N * H;

        // Freeze current position
        r.isSpinning = false;
        cancelAnimationFrame(r.animId);
        const capturedOffset = r.offset;

        // Find targetSym positions in strip
        const candidates = r.symbols
            .map((s, i) => s === targetSym ? i : -1)
            .filter(i => i >= 0);

        // If symbol not found, force-insert it into all 3 copies
        if (candidates.length === 0) {
            const fi = Math.floor(Math.random() * STRIP_N);
            r.symbols[fi] = targetSym;
            const cells = document.querySelectorAll('#strip-' + ri + ' .sym-cell');
            const newCell = makeCell(targetSym);
            for (let copy = 0; copy < 3; copy++) {
                if (cells[fi + copy * STRIP_N]) {
                    cells[fi + copy * STRIP_N].innerHTML = newCell.innerHTML;
                }
            }
            candidates.push(fi);
        }

        const targetIdx = candidates[Math.floor(Math.random() * candidates.length)];

        // Target Y: when translateY = -(targetIdx - 1) * H, that symbol is centered
        // (row 0 = top, row 1 = center, row 2 = bottom of the 3-visible window)
        let targetY = -(targetIdx - 1) * H;

        // Normalise into [-halfH, 0]
        while (targetY > 0)      targetY -= halfH;
        while (targetY <= -halfH) targetY += halfH;

        // Make sure we always scroll forward (more negative) from capturedOffset
        // and add at least 3 symbol heights of travel
        const MIN_TRAVEL = 3 * H;
        while (targetY > capturedOffset - MIN_TRAVEL) targetY -= halfH;

        const strip    = document.getElementById('strip-' + ri);
        const distance = Math.abs(targetY - capturedOffset);
        // Duration: ~60 frames per SPIN_SPEED px → duration in ms
        const duration = Math.max(500, Math.min(1400, distance / SPIN_SPEED * (1000 / 60)));

        const anim = strip.animate(
            [{ transform: 'translateY(' + capturedOffset + 'px)' },
             { transform: 'translateY(' + targetY + 'px)' }],
            { duration, easing: 'cubic-bezier(0.17, 0.67, 0.35, 1.0)', fill: 'forwards' }
        );
        r.stopAnim = anim;  // stored so startReelSpin can cancel the fill effect

        anim.onfinish = () => {
            // Set inline style to final position before the next spin cancels the animation
            strip.style.transform = 'translateY(' + targetY + 'px)';
            r.offset = targetY;
            resolve();
        };
    });
}

// ════════════════════════════════════════════
//   EVALUATE RESULT
// ════════════════════════════════════════════
function evaluate(results) {
    const [a, b, c] = results;
    const bet = getBet();

    // Cherry rules (cascading)
    if (a === '🍒') {
        if (b === '🍒' && c === '🍒') {
            return { mult: 10, msg: '🍒🍒🍒 — BET × 10!', hl: [0,1,2] };
        }
        if (b === '🍒') {
            return { mult: 5, msg: '🍒🍒 — BET × 5!', hl: [0,1] };
        }
        return { mult: 2, msg: '🍒 — BET × 2!', hl: [0] };
    }

    // 3-of-a-kind
    if (a === b && b === c) {
        const TABLE = { '🔔':10, 'BAR':20, '7️⃣':30, '🍇':40, '🍑':60, '🍊':100 };
        const mult = TABLE[a];
        if (mult) {
            const label = a === 'BAR' ? 'BAR BAR BAR' : a + a + a;
            return { mult, msg: label + ' — BET × ' + mult + '!', hl: [0,1,2] };
        }
    }

    return { mult: 0, msg: '', hl: [] };
}

// ════════════════════════════════════════════
//   HIGHLIGHT REELS
// ════════════════════════════════════════════
function setHighlight(indices) {
    for (let i = 0; i < 3; i++) {
        document.getElementById('reel-' + i).classList.toggle('win-hl', indices.includes(i));
    }
}

// ════════════════════════════════════════════
//   LEVER HELPERS
// ════════════════════════════════════════════
function getLeverRange() {
    const shaft = document.querySelector('.lever-shaft');
    const ball  = document.getElementById('lever-ball');
    const min   = LEVER_BALL_INIT_TOP;
    const max   = Math.max(min + 20, shaft.clientHeight - ball.offsetHeight - 18);
    return { min, max };
}

function setLeverBallTop(top) {
    leverBallTop = top;
    document.getElementById('lever-ball').style.top = top + 'px';
}

function springBackLever(fromTop) {
    if (leverSpringAnim) { leverSpringAnim.cancel(); leverSpringAnim = null; }
    const ball   = document.getElementById('lever-ball');
    const mid1   = Math.max(0, LEVER_BALL_INIT_TOP - 8);  // overshoot up
    const mid2   = LEVER_BALL_INIT_TOP + 4;               // settle bounce
    const anim   = ball.animate([
        { top: fromTop + 'px' },
        { top: mid1   + 'px', offset: 0.55 },
        { top: mid2   + 'px', offset: 0.78 },
        { top: LEVER_BALL_INIT_TOP + 'px' },
    ], { duration: 420, easing: 'ease-out', fill: 'forwards' });
    leverSpringAnim = anim;
    anim.onfinish = () => {
        setLeverBallTop(LEVER_BALL_INIT_TOP);
        if (leverSpringAnim === anim) { anim.cancel(); leverSpringAnim = null; }
    };
}

// ════════════════════════════════════════════
//   LEVER ANIMATION (button / keyboard spin)
// ════════════════════════════════════════════
async function animateLever() {
    if (leverSpringAnim) { leverSpringAnim.cancel(); leverSpringAnim = null; }
    const { max } = getLeverRange();
    const ball = document.getElementById('lever-ball');
    // Snap down
    const snapAnim = ball.animate([
        { top: leverBallTop + 'px' },
        { top: max + 'px' },
    ], { duration: 120, easing: 'ease-in', fill: 'forwards' });
    await new Promise(r => { snapAnim.onfinish = r; });
    setLeverBallTop(max);
    snapAnim.cancel();
    // Spring back
    springBackLever(max);
    await sleep(420);
}

// ════════════════════════════════════════════
//   LEVER INTERACTION (drag / touch)
// ════════════════════════════════════════════
(function initLeverInteraction() {
    const leverArea = document.getElementById('lever');

    leverArea.addEventListener('pointerdown', e => {
        if (spinning) return;
        if (leverSpringAnim) { leverSpringAnim.cancel(); leverSpringAnim = null; }
        leverDragging      = true;
        leverAutoCompleted = false;
        leverDragStartY    = e.clientY;
        leverDragStartBallTop = leverBallTop;
        leverArea.setPointerCapture(e.pointerId);
        e.preventDefault();
    });

    leverArea.addEventListener('pointermove', e => {
        if (!leverDragging || leverAutoCompleted) return;
        const { min, max } = getLeverRange();
        const range  = max - min;
        const deltaY = e.clientY - leverDragStartY;
        const newTop = Math.max(min, Math.min(max, leverDragStartBallTop + deltaY));
        setLeverBallTop(newTop);

        // Auto-complete past threshold
        if ((newTop - min) / range >= LEVER_SNAP_THRESHOLD) {
            leverAutoCompleted = true;
            leverDragging      = false;
            leverArea.releasePointerCapture(e.pointerId);
            setLeverBallTop(max);
            springBackLever(max);
            doSpin(true);
        }
    });

    function onRelease(e) {
        if (!leverDragging) return;
        leverDragging = false;
        leverArea.releasePointerCapture(e.pointerId);
        springBackLever(leverBallTop);  // spring back, no spin
    }
    leverArea.addEventListener('pointerup',     onRelease);
    leverArea.addEventListener('pointercancel', onRelease);
})();

// ════════════════════════════════════════════
//   DETERMINE SPIN RESULTS (weighted)
// ════════════════════════════════════════════
function pickResults() {
    // Each reel result is independently random
    return [weightedRandom(), weightedRandom(), weightedRandom()];
}

// ════════════════════════════════════════════
//   MAIN SPIN
// ════════════════════════════════════════════
async function doSpin(skipLeverAnim = false) {
    if (spinning) return;
    const bet = getBet();
    if (chips < bet) {
        showMsg('칩이 부족합니다!');
        return;
    }

    spinning = true;
    setButtons(false);
    setHighlight([]);
    showMsg('');

    chips -= bet;
    updateDisplays();

    if (!skipLeverAnim) await animateLever();

    const results = pickResults();

    // Start all 3 reels simultaneously
    for (let ri = 0; ri < 3; ri++) startReelSpin(ri);

    // Stop reels left → right with delay
    await sleep(1400);
    await stopReel(0, results[0]);

    await sleep(500);
    await stopReel(1, results[1]);

    await sleep(500);
    await stopReel(2, results[2]);

    // Evaluate
    const { mult, msg, hl } = evaluate(results);
    if (mult > 0) {
        const win = bet * mult;
        chips  += win;
        earned += win - bet; // net gain
        setHighlight(hl);
        showMsg(msg + '  (+ ' + win.toLocaleString() + ' 칩)');
    } else {
        showMsg('꽝! 다시 도전하세요.');
    }

    updateDisplays();
    spinning = false;
    setButtons(true);
}

// ════════════════════════════════════════════
//   UI HELPERS
// ════════════════════════════════════════════
function showMsg(txt) {
    document.getElementById('result-msg').textContent = txt;
}
function setButtons(enabled) {
    ['btn-spin','btn-bet-up','btn-bet-dn','btn-max','btn-pay'].forEach(id => {
        document.getElementById(id).disabled = !enabled;
    });
    document.getElementById('lever').style.pointerEvents = enabled ? '' : 'none';
}
function changeBet(dir) {
    if (spinning) return;
    betIdx = Math.max(0, Math.min(BET_STEPS.length - 1, betIdx + dir));
    // Make sure bet ≤ chips
    while (betIdx > 0 && BET_STEPS[betIdx] > chips) betIdx--;
    updateDisplays();
}
function setMaxBet() {
    if (spinning) return;
    betIdx = BET_STEPS.length - 1;
    while (betIdx > 0 && BET_STEPS[betIdx] > chips) betIdx--;
    updateDisplays();
}

// ════════════════════════════════════════════
//   EVENT LISTENERS
// ════════════════════════════════════════════
document.getElementById('btn-spin').addEventListener('click', doSpin);
document.getElementById('btn-bet-up').addEventListener('click', () => changeBet(+1));
document.getElementById('btn-bet-dn').addEventListener('click', () => changeBet(-1));
document.getElementById('btn-max').addEventListener('click', setMaxBet);
document.getElementById('btn-pay').addEventListener('click', () => {
    document.getElementById('paytable-overlay').classList.add('open');
});
document.getElementById('btn-pay-close').addEventListener('click', () => {
    document.getElementById('paytable-overlay').classList.remove('open');
});
// Lever interaction is handled by initLeverInteraction() above (pointer events)

// Keyboard
document.addEventListener('keydown', e => {
    if (e.target.tagName === 'INPUT') return;
    const key = e.key.toLowerCase();
    if (key === 'w') doSpin();
    else if (key === 'e') changeBet(+1);
    else if (key === 'q') changeBet(-1);
    else if (key === 's') setMaxBet();
    else if (key === 'f') document.getElementById('btn-pay').click();
    else if (key === 'escape') document.getElementById('paytable-overlay').classList.remove('open');
});

// Close modal on overlay click
document.getElementById('paytable-overlay').addEventListener('click', e => {
    if (e.target === document.getElementById('paytable-overlay'))
        document.getElementById('paytable-overlay').classList.remove('open');
});

// ════════════════════════════════════════════
//   INIT
// ════════════════════════════════════════════
initReels();
updateDisplays();
</script>
</body>

<script>
// ── 심볼 정의 ──────────────────────────────────────────────
const SYMBOLS = ['🍒','🍋','🍊','🍇','⭐','💎','7️⃣'];
const WEIGHTS  = [30,  25,  20,  15,  6,   3,   1];   // 가중치 (합=100)
const PAYOUTS  = { '🍒':5, '🍋':8, '🍊':10, '🍇':15, '⭐':20, '💎':50, '7️⃣':100 };

// 가중 랜덤
function weightedRandom() {
    const total = WEIGHTS.reduce((a,b)=>a+b,0);
    let r = Math.random()*total;
    for (let i=0;i<SYMBOLS.length;i++) { r -= WEIGHTS[i]; if (r<=0) return SYMBOLS[i]; }
    return SYMBOLS[0];
}

// ── 릴 스트립 생성 ─────────────────────────────────────────
const STRIP_LEN = 40; // 스트립 심볼 수
const reelData  = [[], [], []]; // 각 릴의 심볼 배열

function buildStrips() {
    for (let r=0; r<3; r++) {
        const strip = document.getElementById(`strip-${r}`);
        strip.innerHTML = '';
        reelData[r] = [];
        // 넉넉히 심볼 채우기
        for (let i=0; i<STRIP_LEN; i++) {
            const s = weightedRandom();
            reelData[r].push(s);
            const cell = document.createElement('div');
            cell.className = 'symbol-cell';
            cell.textContent = s;
            strip.appendChild(cell);
        }
        // 연속 루프를 위해 앞 3개를 뒤에 복사
        for (let i=0; i<3; i++) {
            const cell = document.createElement('div');
            cell.className = 'symbol-cell';
            cell.textContent = reelData[r][i];
            strip.appendChild(cell);
        }
    }
}
buildStrips();

// ── 심볼 높이 (CSS 변수에서 가져오기) ───────────────────────
function getSymbolH() {
    return parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--symbol-h')) || 80;
}

// ── 상태 ──────────────────────────────────────────────────
let credits = 100;
let bet     = 5;
let spinning = false;
let lightAnim = null;
let bulbAnims = [];

// ── UI 업데이트 ────────────────────────────────────────────
function updateUI() {
    document.getElementById('credits-val').textContent = credits;
    document.getElementById('bet-val').textContent = bet;
}
updateUI();

document.getElementById('bet-dec').addEventListener('click', () => {
    if (!spinning && bet > 1) { bet = Math.max(1, bet-1); updateUI(); }
});
document.getElementById('bet-inc').addEventListener('click', () => {
    if (!spinning && bet < 20 && bet < credits) { bet = Math.min(20, bet+1, credits); updateUI(); }
});
document.getElementById('reset-btn').addEventListener('click', () => {
    if (!spinning) { credits=100; bet=Math.min(bet,credits); updateUI(); setMsg('💰 크레딧 충전!','#0f0'); }
});

function setMsg(txt, color='#FFD700') {
    const el = document.getElementById('result-msg');
    el.textContent = txt;
    el.style.color = color;
}

// ── 조명 애니메이션 ────────────────────────────────────────
const BULB_COLORS = ['#ff4444','#ff8800','#ffff00','#44ff44','#00aaff','#aa44ff','#ff44aa'];

function startLights(mode='idle') {
    stopLights();
    const topBulbs    = [...document.querySelectorAll('#top-lights .bulb')];
    const bottomBulbs = [...document.querySelectorAll('#bottom-lights .bulb')];
    const allBulbs    = [...topBulbs, ...bottomBulbs];

    if (mode === 'idle') {
        // 순차 켜짐 (앞뒤로)
        let idx = 0;
        let dir = 1;
        lightAnim = setInterval(() => {
            allBulbs.forEach((b,i) => {
                const on = (i === idx) || (i === allBulbs.length-1-idx);
                b.style.background = on ? BULB_COLORS[idx % BULB_COLORS.length] : '#333';
                b.style.boxShadow  = on ? `0 0 8px 2px ${BULB_COLORS[idx % BULB_COLORS.length]}` : 'none';
            });
            idx += dir;
            if (idx >= topBulbs.length-1 || idx <= 0) dir *= -1;
        }, 120);

    } else if (mode === 'spin') {
        // 고속 랜덤 점멸
        lightAnim = setInterval(() => {
            allBulbs.forEach(b => {
                const on = Math.random() > 0.5;
                const c  = BULB_COLORS[Math.floor(Math.random()*BULB_COLORS.length)];
                b.style.background = on ? c : '#333';
                b.style.boxShadow  = on ? `0 0 10px 3px ${c}` : 'none';
            });
        }, 80);

    } else if (mode === 'win') {
        // 전체 동시 점멸
        let on = true;
        lightAnim = setInterval(() => {
            const c = BULB_COLORS[Math.floor(Date.now()/200 % BULB_COLORS.length)];
            allBulbs.forEach(b => {
                b.style.background = on ? c : '#333';
                b.style.boxShadow  = on ? `0 0 12px 4px ${c}` : 'none';
            });
            on = !on;
        }, 150);
    }
}

function stopLights() {
    if (lightAnim) clearInterval(lightAnim);
    lightAnim = null;
}

startLights('idle');

// ── 레버 애니메이션 ────────────────────────────────────────
const leverBall  = document.getElementById('lever-ball');
const leverTrack = document.getElementById('lever-track');

function animateLever() {
    return new Promise(resolve => {
        const trackH    = leverTrack.offsetHeight;
        const ballH     = leverBall.offsetHeight;
        const maxTop    = trackH - ballH - 10;
        const startTop  = 10;

        leverBall.animate([
            { top: startTop + 'px' },
            { top: maxTop  + 'px', offset: 0.4, easing: 'cubic-bezier(0.25,0.46,0.45,0.94)' },
            { top: maxTop  + 'px', offset: 0.55 },
            { top: startTop + 'px', easing: 'cubic-bezier(0.55,0,1,0.45)' }
        ], { duration: 600, fill: 'none' });

        setTimeout(resolve, 300); // 당김 완료 시점에 스핀 시작
    });
}

// 레버 클릭/터치
leverBall.addEventListener('click', () => { if (!spinning) doSpin(); });
leverTrack.addEventListener('click', () => { if (!spinning) doSpin(); });

// 레버 드래그 지원
let dragStartY = 0;
leverBall.addEventListener('pointerdown', e => {
    dragStartY = e.clientY;
    e.preventDefault();
});
window.addEventListener('pointerup', e => {
    if (dragStartY && e.clientY - dragStartY > 30 && !spinning) {
        doSpin();
    }
    dragStartY = 0;
});

// ── 스핀 버튼 ──────────────────────────────────────────────
document.getElementById('spin-btn').addEventListener('click', () => { if (!spinning) doSpin(); });

// ── 핵심 스핀 로직 ─────────────────────────────────────────
async function doSpin() {
    if (spinning || credits < bet) {
        if (credits < bet) setMsg('💸 크레딧이 부족합니다!', '#f66');
        return;
    }
    spinning = true;
    credits -= bet;
    document.getElementById('win-val').textContent = 0;
    setMsg('');
    updateUI();

    document.getElementById('spin-btn').disabled = true;
    document.getElementById('bet-dec').disabled  = true;
    document.getElementById('bet-inc').disabled  = true;

    // 릴 하이라이트 초기화
    for (let i=0;i<3;i++) {
        document.getElementById(`reel-${i}`).style.boxShadow = '';
    }

    // 레버 당기기
    await animateLever();

    // 결과 미리 결정
    const results = [weightedRandom(), weightedRandom(), weightedRandom()];
    startLights('spin');

    // 각 릴 스핀 시작 (딜레이 없이 동시 시작, 정지만 순차)
    const stopDelays = [1600, 2200, 2800]; // ms
    const spinDuration = [2000, 2600, 3200];
    const symH = getSymbolH();

    const promises = results.map((targetSym, reelIdx) => {
        return spinReel(reelIdx, targetSym, spinDuration[reelIdx], stopDelays[reelIdx]);
    });

    await Promise.all(promises);

    // 결과 판정
    stopLights();
    evaluateResult(results);

    spinning = false;
    document.getElementById('spin-btn').disabled = false;
    document.getElementById('bet-dec').disabled  = false;
    document.getElementById('bet-inc').disabled  = false;
    startLights('idle');
}

// ── 릴 스핀 애니메이션 ─────────────────────────────────────
// 각 릴이 독립적으로 고속 회전 후 목표 심볼에 멈춤
function spinReel(reelIdx, targetSym, duration, stopAt) {
    return new Promise(resolve => {
        const strip  = document.getElementById(`strip-${reelIdx}`);
        const symH   = getSymbolH();
        const total  = STRIP_LEN;

        // 목표 심볼 index 찾기 (랜덤 위치 중 하나)
        const candidates = [];
        for (let i=0;i<total;i++) {
            if (reelData[reelIdx][i] === targetSym) candidates.push(i);
        }
        // 없으면 강제로 삽입
        let targetIdx = candidates.length
            ? candidates[Math.floor(Math.random()*candidates.length)]
            : Math.floor(Math.random()*total);

        // 목표 Y: targetIdx번째 심볼이 중앙(3번째 행)에 오도록
        // 릴 윈도우 높이의 중앙 = 1*symH (0-indexed: 0, 1, 2 -> 중앙은 1)
        const visibleRows = 3;
        const centerRow   = 1;
        const targetY = -(targetIdx - centerRow) * symH;

        // 최소 3바퀴 이상 돌도록 추가 오프셋
        const minExtra = 3 * total * symH;
        const extraTurns = minExtra + Math.floor(Math.random()*total)*symH;
        const endY = targetY - extraTurns;

        // Web Animations API 사용
        // 시작: 현재 위치(0)
        // 감속 곡선으로 돌다가 targetY에 착지
        const anim = strip.animate([
            { transform: 'translateY(0px)', easing: 'cubic-bezier(0.2,0,0.8,1)' },
            { transform: `translateY(${endY}px)`, easing: 'cubic-bezier(0.25,0.46,0.45,0.94)' },
        ], {
            duration: duration,
            fill: 'forwards',
            easing: 'ease-in'
        });

        // 애니메이션 끝나면 CSS transform 확정하고 Promise 해결
        anim.onfinish = () => {
            strip.style.transform = `translateY(${endY}px)`;
            resolve();
        };
    });
}

// ── 결과 판정 ──────────────────────────────────────────────
function evaluateResult(results) {
    const [a, b, c] = results;
    let payout = 0;
    let msg    = '';
    let isWin  = false;

    if (a === b && b === c) {
        // 3개 일치
        payout = bet * PAYOUTS[a];
        isWin  = true;
        if (a === '7️⃣') {
            msg = `🎉 JACKPOT!!! +${payout}`;
        } else if (a === '💎') {
            msg = `💎 다이아몬드! +${payout}`;
        } else {
            msg = `🎊 3개 일치! +${payout}`;
        }
        // 모든 릴 하이라이트
        for (let i=0;i<3;i++) highlightReel(i);
    } else if (a === b || a === c || b === c) {
        // 2개 일치 (체리만)
        const pair = a===b ? a : (a===c ? a : b);
        if (pair === '🍒') {
            payout = bet * 2;
            isWin  = true;
            msg    = `🍒 체리 2개! +${payout}`;
            // 일치하는 릴만 하이라이트
            if (a===b) { highlightReel(0); highlightReel(1); }
            else if (a===c) { highlightReel(0); highlightReel(2); }
            else { highlightReel(1); highlightReel(2); }
        }
    }

    if (payout > 0) {
        credits += payout;
        document.getElementById('win-val').textContent = payout;
        startLights('win');
        setTimeout(() => startLights('idle'), 3000);
    }

    setMsg(msg || (credits <= 0 ? '💸 게임 오버! 충전하세요.' : '다시 도전!'), isWin ? '#FFD700' : '#aaa');
    updateUI();

    // 당첨 시 payline 강조
    if (isWin) {
        const pl = document.getElementById('payline');
        pl.animate([
            { opacity: 1, boxShadow: '0 0 20px 8px #FFD700' },
            { opacity: 0.2 },
            { opacity: 1, boxShadow: '0 0 20px 8px #FFD700' },
            { opacity: 0.2 },
            { opacity: 1, boxShadow: '0 0 8px 2px rgba(255,215,0,0.6)' },
        ], { duration: 1500, fill: 'forwards' });
    }
}

function highlightReel(idx) {
    document.getElementById(`reel-${idx}`).style.boxShadow = '0 0 20px 5px rgba(255,215,0,0.9)';
}

// ── 리셋 시 스트립 초기화 ──────────────────────────────────
// 스핀 전마다 스트립을 리빌드하여 무한 루프처럼 보이게
document.getElementById('spin-btn').addEventListener('mousedown', () => {
    if (!spinning) {
        for (let i=0;i<3;i++) {
            const strip = document.getElementById(`strip-${i}`);
            strip.style.transform = 'translateY(0px)';
        }
        buildStrips();
    }
}, true);
</script>

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta name="keywords" content="슬롯머신, 슬롯게임, 온라인슬롯, 카지노게임, 레트로게임">
    <meta name="robots" content="index, follow">

    <meta property="og:type" content="website">
    <meta property="og:title" content="슬롯머신 - My Toys">
    <meta property="og:description" content="Fallout 스타일의 레트로 슬롯머신 게임">
    <meta property="og:locale" content="ko_KR">
    <meta property="og:site_name" content="My Toys">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="슬롯머신 - My Toys">
    <meta name="twitter:description" content="Fallout 스타일의 레트로 슬롯머신 게임">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --sym-h: 80px;
            --chrome-hi: #f4f4f4;
            --chrome-mid: #c8c8c8;
            --chrome-lo: #909090;
            --gold-hi: #f8e060;
            --gold-mid: #c8980c;
            --gold-lo: #7a5a00;
            --panel-bg: #0c0c0c;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background:
                radial-gradient(ellipse at 50% 0%, #484848 0%, #282828 40%, #101010 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Oswald', sans-serif;
            color: #222;
            padding: 16px;
        }

        /* ─── Machine body — ribbed chrome ───────── */
        .machine {
            width: 100%;
            max-width: 520px;
            /* Layered: horizontal ribs over chrome gradient */
            background-color: #c0c0c0;
            background-image:
                repeating-linear-gradient(
                    180deg,
                    transparent           0px,
                    rgba(255,255,255,.13) 1px,
                    rgba(0,0,0,.09)       2.5px,
                    transparent           4px
                ),
                linear-gradient(170deg,
                    #ffffff 0%,
                    #ebebeb 7%,
                    #d0d0d0 18%,
                    #b4b4b4 36%,
                    #cccccc 52%,
                    #b8b8b8 68%,
                    #a0a0a0 84%,
                    #b0b0b0 100%);
            border: 2px solid #686868;
            border-radius: 10px 10px 6px 6px;
            box-shadow:
                inset 6px 0 14px rgba(255,255,255,.75),
                inset -6px 0 14px rgba(0,0,0,.28),
                inset 0 5px 10px rgba(255,255,255,.55),
                0 0 0 1px rgba(0,0,0,.4),
                0 14px 60px rgba(0,0,0,.9),
                0 30px 100px rgba(0,0,0,.5);
            position: relative;
            overflow: visible;
        }

        /* ─── Gold trim bands ──────────────────────── */
        .trim-top, .trim-bot {
            height: 10px;
            background-image:
                repeating-linear-gradient(
                    90deg,
                    rgba(255,255,255,.18) 0px,
                    rgba(255,255,255,.06) 2px,
                    rgba(0,0,0,.12) 4px,
                    transparent 6px
                ),
                linear-gradient(180deg,
                    #fff8b0 0%,
                    #f0d050 18%,
                    #c89010 42%,
                    #e8c028 62%,
                    #a07010 82%,
                    #c8a020 100%);
            border-top: 1px solid rgba(255,255,255,.65);
            border-bottom: 1px solid rgba(0,0,0,.35);
        }
        .trim-top { border-radius: 9px 9px 0 0; }
        .trim-bot { border-radius: 0 0 5px 5px; }

        /* ─── Header — protrudes forward ──────────── */
        .machine-header {
            padding: 12px 20px 10px;
            text-align: center;
            background: linear-gradient(180deg, #1e1e1e 0%, #0a0a0a 100%);
            border-bottom: 5px solid var(--gold-mid);
            position: relative;
            z-index: 4;
            /* Cast shadow down onto reel section — protrusion effect */
            box-shadow:
                0 10px 32px rgba(0,0,0,.98),
                0 4px 12px rgba(0,0,0,.75),
                inset 0 1px 0 rgba(255,255,255,.08);
            /* Chrome rib strip along bottom edge */
        }
        .machine-header::after {
            content: '';
            position: absolute;
            bottom: -9px; left: 0; right: 0;
            height: 5px;
            background-image:
                repeating-linear-gradient(
                    90deg,
                    rgba(255,255,255,.4) 0px,
                    rgba(255,255,255,.1) 2px,
                    rgba(0,0,0,.2) 4px,
                    transparent 6px
                ),
                linear-gradient(180deg, #d8d4c0, #a09070);
            z-index: 5;
        }
        /* ─── Result display in header ───────────────── */
        .result-display {
            padding: 10px 16px 8px;
            text-align: center;
            min-height: 58px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        #result-header {
            font-family: 'Oswald', sans-serif;
            font-weight: 700;
            font-size: 1.45rem;
            letter-spacing: 0.18em;
            color: var(--gold-hi);
            text-shadow: 0 0 18px rgba(248,224,96,.75), 0 2px 0 #000;
            text-transform: uppercase;
            transition: color 0.25s, text-shadow 0.25s;
        }
        #result-header.state-win {
            color: #ffff55;
            text-shadow: 0 0 26px rgba(255,255,0,.9), 0 2px 0 #000;
            animation: header-win-pulse 0.4s ease-in-out 4;
        }
        #result-header.state-lose {
            color: #888;
            text-shadow: 0 1px 0 #000;
            font-size: 1.1rem;
            letter-spacing: 0.1em;
        }
        #result-header.state-spin {
            color: #88ccff;
            text-shadow: 0 0 14px rgba(100,190,255,.8), 0 2px 0 #000;
            letter-spacing: 0.28em;
        }
        @keyframes header-win-pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.06); }
        }
        .result-display-sub {
            font-size: 0.56rem;
            letter-spacing: 0.38em;
            color: #5a5a5a;
            margin-top: 3px;
            text-transform: uppercase;
        }

        /* ─── Reel section — recessed panel + chrome sides ── */
        .reel-section {
            display: flex;
            align-items: stretch;
            padding: 16px 20% 16px 20%;
            gap: 8px;
            position: relative;
            z-index: 2;
            background: #050505;
            border-top: 3px solid #806808;
            border-bottom: 3px solid #806808;
            /* Shadow from overhanging header */
            box-shadow: inset 0 8px 24px rgba(0,0,0,.95), inset 0 -6px 16px rgba(0,0,0,.7);
            overflow: visible;
        }

        /* Convex-top → concave-mid chrome side columns */
        .reel-section::before,
        .reel-section::after {
            content: '';
            position: absolute;
            top: 0; bottom: 0;
            width: 20%;
            z-index: 1;
            pointer-events: none;
        }
        .reel-section::before {
            left: 0;
            background-image:
                /* Convex highlight upper / concave shadow lower */
                radial-gradient(ellipse 220% 48% at 60% 28%, rgba(255,255,255,.42) 0%, transparent 55%),
                radial-gradient(ellipse 220% 44% at 40% 68%, rgba(0,0,0,.60) 0%, transparent 52%),
                /* Horizontal ribs */
                repeating-linear-gradient(
                    180deg,
                    rgba(255,255,255,.10) 0px,
                    rgba(255,255,255,.04) 1px,
                    rgba(0,0,0,.08) 2.5px,
                    transparent 4px
                ),
                /* Base S-curve chrome tone */
                linear-gradient(180deg,
                    #e0ddd8 0%, #eeebe6 12%, #c8c5c0 28%,
                    #787470 46%, #646060 56%,
                    #808078 68%, #989490 82%, #aeaaa6 100%);
            box-shadow: inset -3px 0 10px rgba(0,0,0,.55), inset 1px 0 5px rgba(255,255,255,.25);
        }
        .reel-section::after {
            right: 0;
            background-image:
                radial-gradient(ellipse 220% 48% at 40% 28%, rgba(255,255,255,.34) 0%, transparent 55%),
                radial-gradient(ellipse 220% 44% at 60% 68%, rgba(0,0,0,.55) 0%, transparent 52%),
                repeating-linear-gradient(
                    180deg,
                    rgba(255,255,255,.08) 0px,
                    rgba(255,255,255,.03) 1px,
                    rgba(0,0,0,.08) 2.5px,
                    transparent 4px
                ),
                linear-gradient(180deg,
                    #d4d1cc 0%, #e2dfd8 12%, #bcb9b4 28%,
                    #6c6864 46%, #585450 56%,
                    #74706c 68%, #8c8884 82%, #a0a09c 100%);
            box-shadow: inset 3px 0 10px rgba(0,0,0,.55), inset -1px 0 5px rgba(255,255,255,.18);
        }

        /* ─── Reels container ──────────────────────── */
        .reels-wrap {
            flex: 1;
            position: relative;
        }
        .reel-frame {
            background: #f5f0e8;
            /* Thick beveled chrome border — like the real machine bezel */
            border-style: solid;
            border-width: 8px;
            border-color: #e8e8e8 #787878 #606060 #d0d0d0;
            border-radius: 3px;
            overflow: hidden;
            position: relative;
            z-index: 2;
            box-shadow:
                /* Deep recess shadow */
                inset 0 6px 18px rgba(0,0,0,.65),
                inset 0 -4px 12px rgba(0,0,0,.45),
                inset 4px 0 10px rgba(0,0,0,.3),
                inset -4px 0 10px rgba(0,0,0,.3),
                /* Outer chrome edge glow */
                0 0 0 1px rgba(255,255,255,.2),
                0 6px 20px rgba(0,0,0,.9);
        }
        .reel-frame::before,
        .reel-frame::after {
            content: '';
            position: absolute;
            left: 0; right: 0;
            height: 34px;
            z-index: 10;
            pointer-events: none;
        }
        .reel-frame::before {
            top: 0;
            background: linear-gradient(to bottom, rgba(0,0,0,.6) 0%, transparent 100%);
        }
        .reel-frame::after {
            bottom: 0;
            background: linear-gradient(to top, rgba(0,0,0,.6) 0%, transparent 100%);
        }

        /* Payline — red center line */
        .payline {
            position: absolute;
            left: -8px; right: -8px;
            top: 50%;
            transform: translateY(-50%);
            height: 4px;
            background: rgba(210,20,20,.75);
            box-shadow: 0 0 8px rgba(220,30,30,.5);
            z-index: 20;
            pointer-events: none;
            border-radius: 2px;
        }
        .payline::before, .payline::after {
            content: '▶';
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            font-size: 0.68rem;
            color: rgba(220,30,30,.9);
        }
        .payline::before { left: -15px; }
        .payline::after  { right: -15px; transform: translateY(-50%) scaleX(-1); }

        /* ─── Reel inner ───────────────────────────── */
        .reels-inner {
            display: flex;
            height: calc(var(--sym-h) * 3);
            gap: 6px;
            perspective: 600px;
        }
        .reel-col {
            flex: 1;
            overflow: hidden;
            position: relative;
            border-radius: 3px;
            transform: rotateX(6deg);
            transform-style: preserve-3d;
            box-shadow: 0 4px 12px rgba(0,0,0,.45), 0 1px 3px rgba(0,0,0,.3);
        }
        .reel-strip {
            display: flex;
            flex-direction: column;
            will-change: transform;
        }

        /* Symbol cell */
        .sym-cell {
            height: var(--sym-h);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.4rem;
            flex-shrink: 0;
            background: #f8f4ec;
            border-bottom: 1px solid #e4dece;
            user-select: none;
        }
        .bar-img {
            width: 74%;
            height: auto;
            display: block;
            pointer-events: none;
            user-select: none;
        }

        /* Win highlight */
        .reel-col.win-hl .sym-cell { background: #fffce0; }

        /* ─── Lever — absolutely positioned in right 20% ── */
        .lever-area {
            position: absolute;
            right: 0;
            top: 0;
            bottom: 0;
            width: 20%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 8px 0;
            cursor: grab;
            user-select: none;
            touch-action: none;
            z-index: 10;  /* above chrome ::after column */
        }
        .lever-area:active { cursor: grabbing; }
        .lever-shaft {
            width: 11px;
            height: 90%;
            background-image:
                repeating-linear-gradient(
                    180deg,
                    rgba(255,255,255,.22) 0px,
                    transparent 2px,
                    rgba(0,0,0,.15) 4px,
                    transparent 6px
                ),
                linear-gradient(90deg,
                    #383838 0%, #f0f0f0 28%, #ffffff 46%, #e0e0e0 58%, #383838 100%);
            border-radius: 5px;
            position: relative;
            box-shadow: 3px 3px 10px rgba(0,0,0,.8), -1px 0 4px rgba(255,255,255,.3);
        }
        .lever-ball {
            width: 40px;
            height: 40px;
            /* Glossy red ball */
            background: radial-gradient(circle at 34% 28%,
                #ffaaaa 0%, #ee3030 22%, #cc0000 50%, #880000 78%, #550000 100%);
            border-radius: 50%;
            border: 1px solid #660000;
            box-shadow:
                0 6px 20px rgba(0,0,0,.95),
                0 0 12px rgba(200,0,0,.4),
                inset 4px 4px 9px rgba(255,160,160,.55),
                inset -3px -3px 7px rgba(0,0,0,.65);
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            top: 8px;
        }
        .lever-base {
            width: 26px;
            height: 16px;
            background-image:
                repeating-linear-gradient(
                    90deg,
                    rgba(255,255,255,.25) 0px,
                    transparent 2px,
                    rgba(0,0,0,.12) 4px,
                    transparent 6px
                ),
                linear-gradient(180deg, #c8c8c8, #585858);
            border-radius: 4px;
            position: absolute;
            bottom: 8px;
            left: 50%;
            transform: translateX(-50%);
            box-shadow: 0 3px 8px rgba(0,0,0,.7);
            border: 1px solid #282828;
        }

        /* ─── Footer — flat chrome control shelf ────── */
        .machine-footer {
            /* Chrome ribbed panel — flat (not angled) */
            background-image:
                repeating-linear-gradient(
                    180deg,
                    rgba(255,255,255,.14) 0px,
                    rgba(255,255,255,.05) 1.5px,
                    rgba(0,0,0,.10) 3px,
                    transparent 5px
                ),
                linear-gradient(180deg,
                    #c0bcb8 0%, #d4d0cc 12%, #b8b4b0 30%,
                    #a8a4a0 60%, #bcb8b4 80%, #c4c0bc 100%);
            padding: 0 16px 12px;
            position: relative;
            z-index: 3;
        }

        /* Grand prize divider */
        .grand-prize {
            text-align: center;
            padding: 7px 0 7px;
            position: relative;
        }
        .grand-prize::before, .grand-prize::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 30%;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(0,0,0,.35));
        }
        .grand-prize::before { left: 2%; }
        .grand-prize::after  { right: 2%; background: linear-gradient(90deg, rgba(0,0,0,.35), transparent); }
        .grand-prize span {
            font-size: 0.65rem;
            letter-spacing: 0.38em;
            color: rgba(0,0,0,.5);
            text-transform: uppercase;
        }

        /* LCD display */
        .lcd-row {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
        }
        .lcd-panel {
            flex: 1;
            background: #050e05;
            border: 1px solid #1e3a1e;
            border-radius: 3px;
            padding: 7px 10px;
            font-family: 'Share Tech Mono', monospace;
            box-shadow: inset 0 0 8px rgba(0,0,0,.5), 0 0 6px rgba(80,160,80,.12);
        }
        .lcd-label {
            font-size: 0.56rem;
            color: #3a6a3a;
            letter-spacing: 0.08em;
            margin-bottom: 1px;
        }
        .lcd-value {
            font-size: 1rem;
            color: #7cfc00;
            text-shadow: 0 0 8px rgba(124,252,0,.7);
            letter-spacing: 0.04em;
        }

        /* Result message */
        #result-msg {
            text-align: center;
            min-height: 1.6em;
            font-size: 1rem;
            font-weight: 600;
            letter-spacing: 0.05em;
            color: #1a1a1a;
            text-shadow: 0 1px 0 rgba(255,255,255,.45);
            margin-bottom: 10px;
        }

        /* ─── Push Button Controls ─────────────────── */
        .controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 14px;
            padding: 6px 0 8px;
            flex-wrap: wrap;
        }
        .btn-group-center, .btn-group-right {
            display: flex;
            gap: 12px;
            align-items: center;
        }
        .btn-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }
        .btn-wrap-label {
            font-size: 0.5rem;
            color: rgba(0,0,0,.42);
            letter-spacing: 0.06em;
            text-transform: uppercase;
            text-shadow: 0 1px 0 rgba(255,255,255,.5);
        }
        /* Generic push-button — flat style */
        .push-btn {
            border: none;
            cursor: pointer;
            font-family: 'Oswald', sans-serif;
            font-weight: 700;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            line-height: 1.15;
            position: relative;
            transition: transform 0.07s, box-shadow 0.07s;
            user-select: none;
            outline: none;
            padding: 0;
        }
        .push-btn:active:not(:disabled) { transform: translateY(4px); }
        .push-btn:disabled { opacity: .4; cursor: not-allowed; }
        /* SPIN — large round red flat */
        .push-btn-spin {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background: #cc1111;
            border: 3px solid #880000;
            color: #fff;
            font-size: 1rem;
            text-shadow: 0 1px 2px rgba(0,0,0,.6);
            box-shadow:
                0 5px 0 #660000,
                0 8px 18px rgba(0,0,0,.55),
                inset 0 1px 0 rgba(255,140,140,.2);
        }
        .push-btn-spin:active:not(:disabled) {
            box-shadow:
                0 1px 0 #660000,
                0 3px 8px rgba(0,0,0,.55),
                inset 0 1px 0 rgba(255,140,140,.2);
        }
        /* BET / MAX — round yellow flat */
        .push-btn-yellow {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            background: #ddaa00;
            border: 3px solid #886600;
            color: #3a2000;
            font-size: 0.68rem;
            text-shadow: 0 1px 0 rgba(255,220,80,.3);
            box-shadow:
                0 5px 0 #5a3e00,
                0 7px 14px rgba(0,0,0,.45),
                inset 0 1px 0 rgba(255,220,80,.2);
        }
        .push-btn-yellow:active:not(:disabled) {
            box-shadow:
                0 1px 0 #5a3e00,
                0 3px 7px rgba(0,0,0,.45),
                inset 0 1px 0 rgba(255,220,80,.2);
        }
        /* 배당 — white square flat */
        .push-btn-white {
            width: 52px;
            height: 52px;
            border-radius: 8px;
            background: #e8e8e8;
            border: 2px solid #999;
            color: #333;
            font-size: 0.68rem;
            text-shadow: 0 1px 0 rgba(255,255,255,.8);
            box-shadow:
                0 5px 0 #666,
                0 7px 14px rgba(0,0,0,.4),
                inset 0 1px 0 rgba(255,255,255,.6);
        }
        .push-btn-white:active:not(:disabled) {
            box-shadow:
                0 1px 0 #666,
                0 3px 7px rgba(0,0,0,.4),
                inset 0 1px 0 rgba(255,255,255,.6);
        }
        /* 리셋 — gray square flat */
        .push-btn-gray {
            width: 52px;
            height: 52px;
            border-radius: 8px;
            background: #b8b8b8;
            border: 2px solid #808080;
            color: #333;
            font-size: 0.68rem;
            text-shadow: 0 1px 0 rgba(255,255,255,.5);
            box-shadow:
                0 5px 0 #555,
                0 7px 14px rgba(0,0,0,.35),
                inset 0 1px 0 rgba(255,255,255,.5);
        }
        .push-btn-gray:active:not(:disabled) {
            box-shadow:
                0 1px 0 #555,
                0 3px 7px rgba(0,0,0,.35),
                inset 0 1px 0 rgba(255,255,255,.5);
        }
        .push-btn .btn-label { font-weight: 700; letter-spacing: 0.04em; }
        .push-btn .key { font-size: 0.44rem; opacity: 0.5; margin-top: 1px; }

        /* ─── Idle attract animations ────────────────── */
        @keyframes idle-spin-glow {
            0%, 40%, 100% {
                box-shadow:
                    0 5px 0 #660000, 0 8px 18px rgba(0,0,0,.55),
                    inset 0 1px 0 rgba(255,140,140,.2);
            }
            20% {
                box-shadow:
                    0 5px 0 #660000, 0 8px 18px rgba(0,0,0,.55),
                    inset 0 1px 0 rgba(255,140,140,.2),
                    0 0 28px 10px rgba(255,40,40,.85), 0 0 56px 20px rgba(255,0,0,.3);
            }
        }
        @keyframes idle-bet-glow {
            0%, 55%, 100% {
                box-shadow:
                    0 5px 0 #5a3e00, 0 7px 14px rgba(0,0,0,.45),
                    inset 0 1px 0 rgba(255,220,80,.2);
            }
            75% {
                box-shadow:
                    0 5px 0 #5a3e00, 0 7px 14px rgba(0,0,0,.45),
                    inset 0 1px 0 rgba(255,220,80,.2),
                    0 0 22px 8px rgba(255,200,0,.9), 0 0 44px 14px rgba(255,150,0,.35);
            }
        }
        @keyframes idle-white-glow {
            0%, 80%, 100% {
                box-shadow:
                    0 5px 0 #666, 0 7px 14px rgba(0,0,0,.4),
                    inset 0 1px 0 rgba(255,255,255,.6);
            }
            90% {
                box-shadow:
                    0 5px 0 #666, 0 7px 14px rgba(0,0,0,.4),

<script>
// ════════════════════════════════════════════
//   CONSTANTS
// ════════════════════════════════════════════
const SYMBOLS  = ['🔔', 'BAR', '7️⃣', '🍇', '🍑', '🍊', '🍒'];
// Weights: cherry toned down so it doesn't win too often
const WEIGHTS  = [12,   10,    8,    14,   10,   6,     8];
const STRIP_N  = 24;   // unique symbols per reel
const SPIN_SPEED = 14; // px per frame during spin (~840px/s at 60fps)
const BET_STEPS  = [1,5,10,25,50,100,250,500,1000];
const INIT_CHIPS = 10000;

// ════════════════════════════════════════════
//   STATE
// ════════════════════════════════════════════
let chips     = INIT_CHIPS;
let earned    = 0;
let betIdx    = 3;  // index into BET_STEPS → 25
let spinning  = false;

// Lever drag state
const LEVER_BALL_INIT_TOP  = 8;
let leverBallTop          = LEVER_BALL_INIT_TOP;
let leverDragging         = false;
let leverDragStartY       = 0;
let leverDragStartBallTop = LEVER_BALL_INIT_TOP;
let leverSpringAnim       = null;

const reels = [
    { symbols: [], offset: 0, animId: null, isSpinning: false, stopAnim: null },
    { symbols: [], offset: 0, animId: null, isSpinning: false, stopAnim: null },
    { symbols: [], offset: 0, animId: null, isSpinning: false, stopAnim: null },
];

// ════════════════════════════════════════════
//   HELPERS
// ════════════════════════════════════════════
function getBet()    { return BET_STEPS[betIdx]; }
function symH()      { return parseInt(getComputedStyle(document.documentElement).getPropertyValue('--sym-h')) || 80; }
function sleep(ms)   { return new Promise(r => setTimeout(r, ms)); }

function weightedRandom() {
    const total = WEIGHTS.reduce((a,b) => a+b, 0);
    let r = Math.random() * total;
    for (let i = 0; i < SYMBOLS.length; i++) {
        r -= WEIGHTS[i];
        if (r <= 0) return SYMBOLS[i];
    }
    return SYMBOLS[SYMBOLS.length - 1];
}

function makeCell(sym) {
    const div = document.createElement('div');
    div.className = 'sym-cell';
    if (sym === 'BAR') {
        const img = document.createElement('img');
        img.src = 'bar.svg';
        img.className = 'bar-img';
        img.alt = 'BAR';
        img.draggable = false;
        div.appendChild(img);
    } else {
        div.textContent = sym;
    }
    return div;
}

function updateDisplays() {
    document.getElementById('disp-bet').textContent   = getBet().toLocaleString();
    document.getElementById('disp-chips').textContent = chips.toLocaleString();
    document.getElementById('disp-earn').textContent  = earned.toLocaleString();
}

// ════════════════════════════════════════════
//   REEL BUILD
// ════════════════════════════════════════════
function buildStrip(ri) {
    const r     = reels[ri];
    const strip = document.getElementById('strip-' + ri);
    strip.innerHTML = '';
    r.symbols = [];

    // Generate strip — no two consecutive cherries
    for (let i = 0; i < STRIP_N; i++) {
        let sym;
        do { sym = weightedRandom(); }
        while (sym === '🍒' && i > 0 && r.symbols[i - 1] === '🍒');
        r.symbols.push(sym);
    }

    // Ensure at least 2 cherries so stopReel can always find one
    const cherryCount = r.symbols.filter(s => s === '🍒').length;
    if (cherryCount < 2) {
        const needed = 2 - cherryCount;
        // Only insert where neither neighbour is already a cherry
        const safe = r.symbols
            .map((s, i) => s !== '🍒' && r.symbols[i-1] !== '🍒' && r.symbols[i+1] !== '🍒' ? i : -1)
            .filter(i => i >= 0);
        for (let k = 0; k < needed && k < safe.length; k++) {
            const pick = safe.splice(Math.floor(Math.random() * safe.length), 1)[0];
            r.symbols[pick] = '🍒';
        }
    }

    // Render 3 copies for safe infinite-scroll target range
    for (let pass = 0; pass < 3; pass++) {
        for (const sym of r.symbols) strip.appendChild(makeCell(sym));
    }

    r.offset = 0;
    strip.style.transform = 'translateY(0px)';
}

function initReels() {
    for (let ri = 0; ri < 3; ri++) {
        buildStrip(ri);
        // Position to center of strip (showing symbols 1,2,3)
        const strip = document.getElementById('strip-' + ri);
        reels[ri].offset = 0;
        strip.style.transform = 'translateY(0px)';
    }
}

// ════════════════════════════════════════════
//   SPIN LOOP (rAF infinite)
// ════════════════════════════════════════════
function startReelSpin(ri) {
    const r = reels[ri];
    const H     = symH();
    const halfH = STRIP_N * H;

    // ── KEY FIX ──────────────────────────────────────────────────────────────
    // element.animate() with fill:'forwards' stays active in the CSS cascade
    // at HIGHER priority than inline styles, overriding every rAF transform set.
    // Cancelling it removes the fill effect so our inline style takes over.
    if (r.stopAnim) {
        r.stopAnim.cancel();   // clears fill:'forwards' override
        r.stopAnim = null;
    }
    // ─────────────────────────────────────────────────────────────────────────

    // Normalize offset into (-halfH, 0] — visually seamless (3 identical copies)
    r.offset = r.offset % halfH;   // JS % keeps sign → result in (-halfH, 0]
    document.getElementById('strip-' + ri).style.transform =
        'translateY(' + r.offset + 'px)';

    r.isSpinning = true;

    function tick() {
        if (!r.isSpinning) return;

        r.offset -= SPIN_SPEED;
        if (r.offset <= -halfH) r.offset += halfH;   // seamless wrap

        document.getElementById('strip-' + ri).style.transform =
            'translateY(' + r.offset + 'px)';

        r.animId = requestAnimationFrame(tick);
    }
    r.animId = requestAnimationFrame(tick);
}

// ════════════════════════════════════════════
//   STOP REEL
// ════════════════════════════════════════════
function stopReel(ri, targetSym) {
    return new Promise(resolve => {
        const r     = reels[ri];
        const H     = symH();
        const halfH = STRIP_N * H;

        // Freeze current position
        r.isSpinning = false;
        cancelAnimationFrame(r.animId);
        const capturedOffset = r.offset;

        // Find targetSym positions in strip
        const candidates = r.symbols
            .map((s, i) => s === targetSym ? i : -1)
            .filter(i => i >= 0);

        // If symbol not found, force-insert it into all 3 copies
        if (candidates.length === 0) {
            const fi = Math.floor(Math.random() * STRIP_N);
            r.symbols[fi] = targetSym;
            const cells = document.querySelectorAll('#strip-' + ri + ' .sym-cell');
            const newCell = makeCell(targetSym);
            for (let copy = 0; copy < 3; copy++) {
                if (cells[fi + copy * STRIP_N]) {
                    cells[fi + copy * STRIP_N].innerHTML = newCell.innerHTML;
                }
            }
            candidates.push(fi);
        }

        const targetIdx = candidates[Math.floor(Math.random() * candidates.length)];

        // Target Y: when translateY = -(targetIdx - 1) * H, that symbol is centered
        // (row 0 = top, row 1 = center, row 2 = bottom of the 3-visible window)
        let targetY = -(targetIdx - 1) * H;

        // Normalise into [-halfH, 0]
        while (targetY > 0)      targetY -= halfH;
        while (targetY <= -halfH) targetY += halfH;

        // Make sure we always scroll forward (more negative) from capturedOffset
        // and add at least 3 symbol heights of travel
        const MIN_TRAVEL = 3 * H;
        while (targetY > capturedOffset - MIN_TRAVEL) targetY -= halfH;

        const strip    = document.getElementById('strip-' + ri);
        const distance = Math.abs(targetY - capturedOffset);
        // Duration: ~60 frames per SPIN_SPEED px → duration in ms
        const duration = Math.max(500, Math.min(1400, distance / SPIN_SPEED * (1000 / 60)));

        const anim = strip.animate(
            [{ transform: 'translateY(' + capturedOffset + 'px)' },
             { transform: 'translateY(' + targetY + 'px)' }],
            { duration, easing: 'cubic-bezier(0.17, 0.67, 0.35, 1.0)', fill: 'forwards' }
        );
        r.stopAnim = anim;  // stored so startReelSpin can cancel the fill effect

        anim.onfinish = () => {
            // Set inline style to final position before the next spin cancels the animation
            strip.style.transform = 'translateY(' + targetY + 'px)';
            r.offset = targetY;
            resolve();
        };
    });
}

// ════════════════════════════════════════════
//   EVALUATE RESULT
// ════════════════════════════════════════════
function evaluate(results) {
    const [a, b, c] = results;
    const bet = getBet();

    // Cherry rules (cascading)
    if (a === '🍒') {
        if (b === '🍒' && c === '🍒') {
            return { mult: 10, msg: '🍒🍒🍒 — BET × 10!', hl: [0,1,2] };
        }
        if (b === '🍒') {
            return { mult: 5, msg: '🍒🍒 — BET × 5!', hl: [0,1] };
        }
        return { mult: 2, msg: '🍒 — BET × 2!', hl: [0] };
    }

    // 3-of-a-kind
    if (a === b && b === c) {
        const TABLE = { '🔔':10, 'BAR':20, '7️⃣':30, '🍇':40, '🍑':60, '🍊':100 };
        const mult = TABLE[a];
        if (mult) {
            const label = a === 'BAR' ? 'BAR BAR BAR' : a + a + a;
            return { mult, msg: label + ' — BET × ' + mult + '!', hl: [0,1,2] };
        }
    }

    return { mult: 0, msg: '', hl: [] };
}

// ════════════════════════════════════════════
//   HIGHLIGHT REELS
// ════════════════════════════════════════════
function setHighlight(indices) {
    for (let i = 0; i < 3; i++) {
        document.getElementById('reel-' + i).classList.toggle('win-hl', indices.includes(i));
    }
}

// ════════════════════════════════════════════
//   LEVER HELPERS
// ════════════════════════════════════════════
function getLeverRange() {
    const shaft = document.querySelector('.lever-shaft');
    const ball  = document.getElementById('lever-ball');
    const min   = LEVER_BALL_INIT_TOP;
    const max   = Math.max(min + 20, shaft.clientHeight - ball.offsetHeight - 18);
    return { min, max };
}

function setLeverBallTop(top) {
    leverBallTop = top;
    document.getElementById('lever-ball').style.top = top + 'px';
}

function springBackLever(fromTop) {
    if (leverSpringAnim) { leverSpringAnim.cancel(); leverSpringAnim = null; }
    const ball   = document.getElementById('lever-ball');
    const mid1   = Math.max(0, LEVER_BALL_INIT_TOP - 8);  // overshoot up
    const mid2   = LEVER_BALL_INIT_TOP + 4;               // settle bounce
    const anim   = ball.animate([
        { top: fromTop + 'px' },
        { top: mid1   + 'px', offset: 0.55 },
        { top: mid2   + 'px', offset: 0.78 },
        { top: LEVER_BALL_INIT_TOP + 'px' },
    ], { duration: 420, easing: 'ease-out', fill: 'forwards' });
    leverSpringAnim = anim;
    anim.onfinish = () => {
        setLeverBallTop(LEVER_BALL_INIT_TOP);
        if (leverSpringAnim === anim) { anim.cancel(); leverSpringAnim = null; }
    };
}

// ════════════════════════════════════════════
//   LEVER ANIMATION (button / keyboard spin)
// ════════════════════════════════════════════
async function animateLever() {
    if (leverSpringAnim) { leverSpringAnim.cancel(); leverSpringAnim = null; }
    const { max } = getLeverRange();
    const ball = document.getElementById('lever-ball');
    hapticLeverSnap();   // 버튼/키보드로 스핀 시 레버 스냅 햅틱
    // Snap down
    const snapAnim = ball.animate([
        { top: leverBallTop + 'px' },
        { top: max + 'px' },
    ], { duration: 120, easing: 'ease-in', fill: 'forwards' });
    await new Promise(r => { snapAnim.onfinish = r; });
    setLeverBallTop(max);
    snapAnim.cancel();
    // Spring back
    springBackLever(max);
    await sleep(420);
}

// ════════════════════════════════════════════
//   LEVER INTERACTION (drag / touch)
// ════════════════════════════════════════════
(function initLeverInteraction() {
    const leverArea = document.getElementById('lever');

    leverArea.addEventListener('pointerdown', e => {
        if (spinning) return;
        if (leverSpringAnim) { leverSpringAnim.cancel(); leverSpringAnim = null; }
        leverDragging         = true;
        leverDragStartY       = e.clientY;
        leverDragStartBallTop = leverBallTop;
        leverArea.setPointerCapture(e.pointerId);
        e.preventDefault();
        hapticLeverDragStart();   // 드득드득 시작
    });

    leverArea.addEventListener('pointermove', e => {
        if (!leverDragging) return;
        const { min, max } = getLeverRange();
        const deltaY = e.clientY - leverDragStartY;
        const newTop = Math.max(min, Math.min(max, leverDragStartBallTop + deltaY));
        setLeverBallTop(newTop);
    });

    function onRelease(e) {
        if (!leverDragging) return;
        leverDragging = false;
        hapticLeverDragStop();
        leverArea.releasePointerCapture(e.pointerId);

        const { min, max } = getLeverRange();
        const ratio = (leverBallTop - min) / (max - min);
        if (ratio >= 0.95) {
            // 끝까지 당겼다가 놓은 경우만 스핀
            setLeverBallTop(max);
            hapticLeverSnap();
            springBackLever(max);
            doSpin(true);
        } else {
            // 중간에 놓으면 그냥 스프링백
            hapticLeverRelease();
            springBackLever(leverBallTop);
        }
    }
    leverArea.addEventListener('pointerup',     onRelease);
    leverArea.addEventListener('pointercancel', onRelease);
})();

// ════════════════════════════════════════════
//   DETERMINE SPIN RESULTS (weighted)
// ════════════════════════════════════════════
function pickResults() {
    // Each reel result is independently random
    return [weightedRandom(), weightedRandom(), weightedRandom()];
}

// ════════════════════════════════════════════
//   MAIN SPIN
// ════════════════════════════════════════════
async function doSpin(skipLeverAnim = false) {
    if (spinning) return;
    const bet = getBet();
    if (chips < bet) {
        showMsg('칩 부족!  베팅을 줄이세요.', 'lose');
        return;
    }

    stopIdleAnim();
    spinning = true;
    setButtons(false);
    setHighlight([]);
    showMsg('SPINNING...', 'spin');

    chips -= bet;
    updateDisplays();

    if (!skipLeverAnim) await animateLever();

    const results = pickResults();

    // Start all 3 reels simultaneously
    for (let ri = 0; ri < 3; ri++) startReelSpin(ri);
    hapticSpinRumbleStart();    // 드르르륵 시작

    // Stop reels left → right with delay
    await sleep(1400);
    await stopReel(0, results[0]);
    hapticReelStop();                       // 첫 번째 릴 딸깍
    hapticSpinRumbleSetLevel(0.65);         // 룰 강도 낮춤

    await sleep(500);
    await stopReel(1, results[1]);
    hapticReelStop();                       // 두 번째 릴 딸깍
    hapticSpinRumbleSetLevel(0.3);          // 룰 강도 더 낮춤

    await sleep(500);
    await stopReel(2, results[2]);
    hapticSpinRumbleStop();                 // 룰 종료
    hapticReelStop();                       // 세 번째 릴 딸깍

    // Evaluate
    const { mult, msg, hl } = evaluate(results);
    if (mult > 0) {
        const win = bet * mult;
        chips  += win;
        earned += win - bet; // net gain
        setHighlight(hl);
        showMsg(msg + '  ＋' + win.toLocaleString() + '칩', 'win');
        setTimeout(() => hapticWin(mult), 120);  // 당첨 축하 패턴
        playWinAnim();
    } else {
        showMsg('꽝!  다시 도전하세요.', 'lose');
        setTimeout(hapticLose, 80);  // 꽝 툭툭
        startIdleAnim();
    }

    updateDisplays();
    spinning = false;
    setButtons(true);
}

// ════════════════════════════════════════════
//   HAPTIC FEEDBACK
// ════════════════════════════════════════════
const HAS_VIB = 'vibrate' in navigator;
function vib(pattern) { if (HAS_VIB) navigator.vibrate(pattern); }

// Button press — sharp click (딸깍)
function hapticClick() { vib(12); }

// Lever drag — rhythmic pulse while pulling (드득드득)
let _leverPulseTimer = null;
function hapticLeverDragStart() {
    if (!HAS_VIB) return;
    clearTimeout(_leverPulseTimer);
    let step = 0;
    function pulse() {
        if (!leverDragging && !leverAutoCompleted) return;
        // Intensity builds as ball is pulled further
        const { min, max } = getLeverRange();
        const ratio = Math.max(0, Math.min(1, (leverBallTop - min) / (max - min)));
        const dur = Math.round(8 + ratio * 14);   // 8→22ms
        navigator.vibrate([dur, 42]);
        _leverPulseTimer = setTimeout(pulse, 50);
        step++;
    }
    pulse();
}
function hapticLeverDragStop() {
    clearTimeout(_leverPulseTimer);
    _leverPulseTimer = null;
}

// Lever snap to bottom (스냅!)
function hapticLeverSnap() { vib([50, 20, 30]); }

// Lever release without triggering spin (살짝 릴리즈)
function hapticLeverRelease() { vib(20); }

// Spin rumble — intensity 0.0~1.0, decreases as reels stop
let _spinRumbleTimer = null;
let _spinRumbleLevel = 1.0;
let _rumbleActive    = false;

function _rumbleLoop() {
    if (!_rumbleActive) return;
    // 강도 차이를 펄스 밀도(off 구간)로 표현 — 손으로 확실히 느낄 수 있게
    // Level 1.0: on=22ms  off=3ms  → 거의 연속 진동 (강)
    // Level 0.65: on=16ms off=22ms → 뚝뚝 끊기는 느낌 (중)
    // Level 0.3: on=10ms  off=50ms → 드문드문 툭툭 (약)
    const lv    = _spinRumbleLevel;
    const onMs  = Math.round(6  + lv * 16);
    const offMs = Math.round(3  + (1 - lv) * 52);
    navigator.vibrate([onMs, offMs]);
    _spinRumbleTimer = setTimeout(_rumbleLoop, onMs + offMs + 1);
}
function hapticSpinRumbleStart() {
    if (!HAS_VIB) return;
    _spinRumbleLevel = 1.0;
    _rumbleActive    = true;
    clearTimeout(_spinRumbleTimer);
    _rumbleLoop();
}
function hapticSpinRumbleSetLevel(level) {
    _spinRumbleLevel = Math.max(0, Math.min(1, level));
}
function hapticSpinRumbleStop() {
    _rumbleActive = false;
    clearTimeout(_spinRumbleTimer);
    _spinRumbleTimer = null;
    if (HAS_VIB) navigator.vibrate(0);
}

// Reel stop click — 딸깍
// Pauses the rumble timer so the click isn't immediately overridden,
// then resumes the rumble loop after the click pattern finishes (~40ms).
function hapticReelStop() {
    if (!HAS_VIB) return;
    clearTimeout(_spinRumbleTimer);          // pause rumble
    navigator.vibrate([18, 12, 10]);         // click (40 ms total)
    if (_rumbleActive) {
        _spinRumbleTimer = setTimeout(_rumbleLoop, 50);  // resume
    }
}

// Win celebration — intensity scales with multiplier
function hapticWin(mult) {
    const beats = Math.min(12, Math.max(2, Math.round(mult / 5)));
    const pat = [];
    for (let i = 0; i < beats; i++) { pat.push(30); pat.push(18); }
    vib(pat);
}

// Lose (툭툭)
function hapticLose() { vib([18, 28, 18]); }

// ════════════════════════════════════════════
//   BUTTON ANIMATIONS
// ════════════════════════════════════════════
function startIdleAnim() {
    document.querySelectorAll('.push-btn').forEach(b => b.classList.add('idle-anim'));
}
function stopIdleAnim() {
    document.querySelectorAll('.push-btn').forEach(b => b.classList.remove('idle-anim'));
}
function playWinAnim() {
    const btns = document.querySelectorAll('.push-btn');
    btns.forEach(b => {
        b.classList.remove('idle-anim', 'win-anim');
        void b.offsetWidth; // force reflow to restart animation
        b.classList.add('win-anim');
    });
    setTimeout(() => {
        btns.forEach(b => b.classList.remove('win-anim'));
        startIdleAnim();
    }, 0.45 * 5 * 1000 + 150);
}

// ════════════════════════════════════════════
//   UI HELPERS
// ════════════════════════════════════════════
function showMsg(txt, type) {
    const el  = document.getElementById('result-header');
    const sub = document.getElementById('result-sub');
    el.className = type ? 'state-' + type : '';
    if (txt) {
        el.textContent = txt;
        sub.style.visibility = 'hidden';
    } else {
        el.textContent = "SHUU'S VEGAS";
        sub.style.visibility = '';
    }
}
function setButtons(enabled) {
    ['btn-spin','btn-bet-up','btn-bet-dn','btn-max','btn-pay','btn-reset'].forEach(id => {
        document.getElementById(id).disabled = !enabled;
    });
    document.getElementById('lever').style.pointerEvents = enabled ? '' : 'none';
}
function resetGame() {
    if (spinning) return;
    chips   = INIT_CHIPS;
    earned  = 0;
    betIdx  = 3;
    setHighlight([]);
    updateDisplays();
    showMsg('');
    startIdleAnim();
}
function changeBet(dir) {
    if (spinning) return;
    betIdx = Math.max(0, Math.min(BET_STEPS.length - 1, betIdx + dir));
    // Make sure bet ≤ chips
    while (betIdx > 0 && BET_STEPS[betIdx] > chips) betIdx--;
    updateDisplays();
}
function setMaxBet() {
    if (spinning) return;
    betIdx = BET_STEPS.length - 1;
    while (betIdx > 0 && BET_STEPS[betIdx] > chips) betIdx--;
    updateDisplays();
}

// ════════════════════════════════════════════
//   EVENT LISTENERS
// ════════════════════════════════════════════
// Button haptic — click feedback on all push-btn presses
document.querySelector('.controls').addEventListener('pointerdown', e => {
    if (e.target.closest('.push-btn')) hapticClick();
});

document.getElementById('btn-spin').addEventListener('click', doSpin);
document.getElementById('btn-bet-up').addEventListener('click', () => changeBet(+1));
document.getElementById('btn-bet-dn').addEventListener('click', () => changeBet(-1));
document.getElementById('btn-max').addEventListener('click', setMaxBet);
document.getElementById('btn-pay').addEventListener('click', () => {
    document.getElementById('paytable-overlay').classList.add('open');
});
document.getElementById('btn-reset').addEventListener('click', resetGame);
document.getElementById('btn-pay-close').addEventListener('click', () => {
    document.getElementById('paytable-overlay').classList.remove('open');
});
// Lever interaction is handled by initLeverInteraction() above (pointer events)

// Keyboard
document.addEventListener('keydown', e => {
    if (e.target.tagName === 'INPUT') return;
    const key = e.key.toLowerCase();
    if (key === 'w') doSpin();
    else if (key === 'e') changeBet(+1);
    else if (key === 'q') changeBet(-1);
    else if (key === 's') setMaxBet();
    else if (key === 'f') document.getElementById('btn-pay').click();
    else if (key === 'escape') document.getElementById('paytable-overlay').classList.remove('open');
});

// Close modal on overlay click
document.getElementById('paytable-overlay').addEventListener('click', e => {
    if (e.target === document.getElementById('paytable-overlay'))
        document.getElementById('paytable-overlay').classList.remove('open');
});

// ════════════════════════════════════════════
//   INIT
// ════════════════════════════════════════════
initReels();
updateDisplays();
startIdleAnim();
</script>

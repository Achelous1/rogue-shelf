<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>오목대전 - My Toys</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; }

        /* ── 오목판 ── */
        #board-canvas { cursor: crosshair; }

        /* ── 로딩 점 애니메이션 ── */
        .dot-ani span { animation: blink 1.4s infinite; }
        .dot-ani span:nth-child(2) { animation-delay: 0.2s; }
        .dot-ani span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes blink { 0%,80%,100%{opacity:0} 40%{opacity:1} }

        /* ── 동전 flip ── */
        .coin-wrap { perspective: 600px; }
        .coin {
            width: 96px; height: 96px;
            transform-style: preserve-3d;
            position: relative;
        }
        .coin-face {
            position: absolute; inset: 0;
            border-radius: 50%;
            backface-visibility: hidden;
            display: flex; align-items: center; justify-content: center;
            font-size: 2rem; font-weight: 900;
        }
        .coin-black { background: radial-gradient(circle at 35% 35%, #555, #111); color: #fff; }
        .coin-white {
            background: radial-gradient(circle at 35% 35%, #fff, #ccc);
            transform: rotateY(180deg);
            color: #333;
            border: 3px solid #bbb;
        }
        @keyframes coinFlip {
            0%   { transform: rotateY(0deg)   translateY(0); }
            20%  { transform: rotateY(360deg)  translateY(-80px); }
            50%  { transform: rotateY(900deg)  translateY(-120px); }
            80%  { transform: rotateY(1440deg) translateY(-30px); }
            100% { transform: rotateY(var(--final-rot)) translateY(0); }
        }
        .coin.flipping { animation: coinFlip 2.2s cubic-bezier(.25,.46,.45,.94) forwards; }

        /* ── 폭죽 confetti ── */
        .confetti-piece {
            position: fixed;
            width: 10px; height: 10px;
            top: -20px;
            animation: confettiFall linear forwards;
            border-radius: 2px;
            z-index: 999;
        }
        @keyframes confettiFall {
            0%   { transform: translateY(0)   rotate(0deg);   opacity: 1; }
            100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
        }

        /* ── 패배 빗방울 ── */
        .raindrop {
            position: fixed;
            width: 2px;
            background: linear-gradient(to bottom, transparent, #60a5fa);
            top: -60px;
            animation: rainFall linear infinite;
            opacity: 0.7;
            z-index: 998;
        }
        @keyframes rainFall {
            0%   { transform: translateY(0); }
            100% { transform: translateY(110vh); }
        }

        /* ── 승패 배너 ── */
        @keyframes bannerPop {
            0%   { transform: scale(0.3) translateY(-60px); opacity: 0; }
            60%  { transform: scale(1.1) translateY(0); opacity: 1; }
            100% { transform: scale(1)   translateY(0); opacity: 1; }
        }
        .banner-pop { animation: bannerPop 0.5s cubic-bezier(.34,1.56,.64,1) forwards; }

        /* ── 화면 전환 fade ── */
        .screen { display: none; }
        .screen.active { display: flex; }
        @keyframes fadeIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
        .screen.active { animation: fadeIn 0.3s ease; }

        /* ── 버튼 ── */
        .btn-primary {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            color: #fff; border: none; border-radius: 12px;
            padding: 12px 32px; font-size: 1.1rem; font-weight: 700;
            cursor: pointer; transition: transform 0.1s, box-shadow 0.2s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.4); }
        .btn-primary:active { transform: translateY(0); }
        .btn-danger { background: linear-gradient(135deg, #7f1d1d, #991b1b); }
        .btn-success { background: linear-gradient(135deg, #14532d, #166534); }
        .btn-secondary {
            background: transparent; color: #6b7280;
            border: 2px solid #d1d5db; border-radius: 10px;
            padding: 10px 24px; font-size: 1rem; font-weight: 600;
            cursor: pointer; transition: all 0.2s;
        }
        .btn-secondary:hover { border-color: #9ca3af; color: #374151; }

        /* ── 오목판 배경 ── */
        #board-wrapper {
            background: linear-gradient(135deg, #d4a96a, #c4955a);
            border-radius: 8px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.4), inset 0 0 20px rgba(0,0,0,0.1);
            padding: 12px;
        }

        /* ── 타이머 바 ── */
        .timer-bar-wrap {
            height: 4px;
            border-radius: 2px;
            background: rgba(255,255,255,0.1);
            overflow: hidden;
            width: 60px;
        }
        .timer-bar {
            height: 100%;
            border-radius: 2px;
            transition: width 1s linear, background-color 0.3s;
        }
        .timer-urgent { animation: timerPulse 0.5s ease-in-out infinite; }
        @keyframes timerPulse {
            0%,100% { opacity: 1; }
            50%      { opacity: 0.5; }
        }
    </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-gray-900 via-slate-800 to-gray-900 flex items-center justify-center">

<!-- ══════════════════════════════════════════
     SCREEN 1: 로비
══════════════════════════════════════════ -->
<div id="screen-lobby" class="screen active flex-col items-center justify-center min-h-screen w-full px-4">
    <div class="text-center max-w-md w-full">
        <div class="mb-2">
            <span class="text-7xl">⚫</span><span class="text-6xl">⚪</span>
        </div>
        <h1 class="text-5xl font-black text-white mb-2 tracking-tight">오목대전</h1>
        <p class="text-slate-400 text-lg mb-1">WebRTC 실시간 2인 대국</p>
        <p class="text-slate-500 text-sm mb-10">렌주룰 적용 · 15×15 · 각 1분 제한</p>

        <div class="bg-white/10 backdrop-blur rounded-2xl p-8 shadow-xl border border-white/10">
            <label class="block text-slate-300 text-sm font-semibold mb-2 text-left">닉네임</label>
            <input id="nickname-input" type="text" maxlength="12" placeholder="닉네임을 입력하세요"
                class="w-full bg-white/10 border border-white/20 text-white placeholder-slate-500
                       rounded-xl px-4 py-3 text-lg focus:outline-none focus:border-blue-400 mb-6"
                value="플레이어">
            <button onclick="startMatching()" class="btn-primary w-full text-xl py-4">
                대국 시작
            </button>
        </div>

        <p class="mt-6 text-slate-600 text-xs">
            렌주룰: 흑 기준 쌍삼·쌍사·장목(6목 이상) 금수 적용
        </p>
        <a href="index.html"
           class="inline-block mt-4 text-slate-600 hover:text-slate-400 text-xs transition-colors">
            ← 홈으로 돌아가기
        </a>
    </div>
</div>

<!-- ══════════════════════════════════════════
     SCREEN 2: 매칭 대기
══════════════════════════════════════════ -->
<div id="screen-matching" class="screen flex-col items-center justify-center min-h-screen w-full px-4">
    <div class="text-center">
        <div class="mb-8 relative">
            <div class="w-24 h-24 rounded-full border-4 border-slate-600 border-t-blue-400 animate-spin mx-auto"></div>
            <span class="absolute inset-0 flex items-center justify-center text-3xl">⚫</span>
        </div>
        <h2 class="text-2xl font-bold text-white mb-3">
            상대방을 찾고 있는 중입니다
            <span class="dot-ani"><span>.</span><span>.</span><span>.</span></span>
        </h2>
        <p id="matching-slot-info" class="text-slate-500 text-sm mb-10">대기실 연결 중...</p>
        <button onclick="cancelMatching()" class="btn-secondary">취소</button>
    </div>
</div>

<!-- ══════════════════════════════════════════
     SCREEN 3: 매칭 완료
══════════════════════════════════════════ -->
<div id="screen-matched" class="screen flex-col items-center justify-center min-h-screen w-full px-4">
    <div class="text-center">
        <div class="text-6xl mb-6">🎉</div>
        <h2 class="text-3xl font-black text-white mb-3">상대방을 찾았습니다!</h2>
        <p id="matched-opponent-name" class="text-xl text-blue-300 mb-8"></p>
        <div class="flex items-center justify-center gap-3">
            <div class="w-3 h-3 rounded-full bg-blue-400 animate-bounce"></div>
            <div class="w-3 h-3 rounded-full bg-blue-400 animate-bounce" style="animation-delay:0.15s"></div>
            <div class="w-3 h-3 rounded-full bg-blue-400 animate-bounce" style="animation-delay:0.3s"></div>
        </div>
        <p id="countdown-text" class="text-slate-400 mt-4 text-sm"></p>
    </div>
</div>

<!-- ══════════════════════════════════════════
     SCREEN 4: 선공 결정 (동전 던지기)
══════════════════════════════════════════ -->
<div id="screen-coin" class="screen flex-col items-center justify-center min-h-screen w-full px-4">
    <div class="text-center">
        <h2 class="text-2xl font-bold text-white mb-2">선공 결정</h2>
        <p class="text-slate-400 mb-10 text-sm">동전을 던져 선공(흑돌)을 정합니다</p>

        <div class="coin-wrap flex justify-center mb-10">
            <div id="coin" class="coin">
                <div class="coin-face coin-black">⚫</div>
                <div class="coin-face coin-white">⚪</div>
            </div>
        </div>

        <div id="coin-result" class="hidden">
            <div id="coin-result-text" class="text-2xl font-black text-white mb-2"></div>
            <div id="coin-result-sub" class="text-slate-400 text-sm"></div>
        </div>
        <div id="coin-waiting" class="text-slate-500 text-sm">
            동전을 던지는 중<span class="dot-ani"><span>.</span><span>.</span><span>.</span></span>
        </div>
    </div>
</div>

<!-- ══════════════════════════════════════════
     SCREEN 5: 게임
══════════════════════════════════════════ -->
<div id="screen-game" class="screen flex-col items-center justify-center min-h-screen w-full px-2 py-4">
    <!-- 상단 플레이어 정보 -->
    <div class="w-full max-w-2xl mb-3">
        <div class="flex items-center justify-between bg-white/5 rounded-xl px-4 py-2 border border-white/10">
            <!-- 나 -->
            <div class="flex items-center gap-2">
                <div id="my-stone-icon" class="w-6 h-6 rounded-full shadow flex-shrink-0"></div>
                <div class="flex flex-col">
                    <div class="flex items-center gap-1.5">
                        <span id="my-name-display" class="text-white font-semibold text-sm leading-none"></span>
                        <span id="my-turn-badge" class="hidden text-xs bg-yellow-400 text-black px-1.5 py-0.5 rounded-full font-bold leading-none">내 차례</span>
                    </div>
                    <div class="flex items-center gap-1.5 mt-1">
                        <span id="my-timer" class="font-mono text-xs font-bold text-white">1:00</span>
                        <div class="timer-bar-wrap">
                            <div id="my-timer-bar" class="timer-bar bg-green-400" style="width:100%"></div>
                        </div>
                    </div>
                </div>
            </div>
            <!-- 중앙 -->
            <div id="turn-info" class="text-slate-300 text-xs font-semibold text-center px-2"></div>
            <!-- 상대 -->
            <div class="flex items-center gap-2 flex-row-reverse">
                <div id="opp-stone-icon" class="w-6 h-6 rounded-full shadow flex-shrink-0"></div>
                <div class="flex flex-col items-end">
                    <div class="flex items-center gap-1.5">
                        <span id="opp-turn-badge" class="hidden text-xs bg-yellow-400 text-black px-1.5 py-0.5 rounded-full font-bold leading-none">차례</span>
                        <span id="opp-name-display" class="text-white font-semibold text-sm leading-none"></span>
                    </div>
                    <div class="flex items-center gap-1.5 mt-1 flex-row-reverse">
                        <span id="opp-timer" class="font-mono text-xs font-bold text-white">1:00</span>
                        <div class="timer-bar-wrap">
                            <div id="opp-timer-bar" class="timer-bar bg-green-400" style="width:100%"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 오목판 -->
    <div id="board-wrapper">
        <canvas id="board-canvas"></canvas>
    </div>

    <!-- 하단 -->
    <div class="mt-3 flex items-center gap-4">
        <div class="text-slate-500 text-xs" id="game-status-text">게임 진행 중</div>
        <button id="btn-resign" onclick="resign()"
            class="btn-primary btn-danger text-sm py-1.5 px-4" style="font-size:0.8rem; padding:6px 16px; border-radius:8px;">
            🏳️ 항복
        </button>
    </div>
</div>

<!-- ══════════════════════════════════════════
     SCREEN 6: 결과
══════════════════════════════════════════ -->
<div id="screen-result" class="screen flex-col items-center justify-center min-h-screen w-full px-4">
    <div id="result-banner" class="text-center banner-pop">
        <div id="result-emoji" class="text-8xl mb-4"></div>
        <h2 id="result-title" class="text-5xl font-black mb-3"></h2>
        <p id="result-sub" class="text-slate-400 mb-10 text-lg"></p>
        <div class="flex gap-4 justify-center">
            <button id="btn-rematch" onclick="requestRematch()" class="btn-primary btn-success">
                재시합 요청
            </button>
            <button onclick="backToLobby()" class="btn-secondary">
                로비로 돌아가기
            </button>
        </div>
        <p id="rematch-status" class="text-slate-500 text-sm mt-4"></p>
    </div>
</div>

<!-- ══════════════════════════════════════════
     RESIGN CONFIRM MODAL
══════════════════════════════════════════ -->
<div id="modal-resign" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50">
    <div class="bg-slate-800 border border-slate-600 rounded-2xl p-8 text-center shadow-2xl max-w-sm w-full mx-4">
        <div class="text-4xl mb-4">🏳️</div>
        <h3 class="text-xl font-black text-white mb-2">정말 항복하시겠습니까?</h3>
        <p class="text-slate-400 mb-6 text-sm">상대방이 승리하게 됩니다</p>
        <div class="flex gap-3">
            <button onclick="confirmResign()" class="btn-primary btn-danger flex-1">항복</button>
            <button onclick="closeResignModal()" class="btn-secondary flex-1">취소</button>
        </div>
    </div>
</div>

<!-- ══════════════════════════════════════════
     REMATCH REQUEST MODAL
══════════════════════════════════════════ -->
<div id="modal-rematch" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50">
    <div class="bg-slate-800 border border-slate-600 rounded-2xl p-8 text-center shadow-2xl max-w-sm w-full mx-4">
        <div class="text-4xl mb-4">⚔️</div>
        <h3 class="text-xl font-black text-white mb-2">재시합 요청</h3>
        <p id="rematch-requester" class="text-slate-400 mb-6 text-sm"></p>
        <div class="flex gap-3">
            <button onclick="acceptRematch()" class="btn-primary btn-success flex-1">승낙</button>
            <button onclick="declineRematch()" class="btn-primary btn-danger flex-1">거절</button>
        </div>
    </div>
</div>

<script>
// ════════════════════════════════════════════════════════════
//  상수 & 전역 상태
// ════════════════════════════════════════════════════════════
const BOARD_SIZE  = 15;
const CELL        = 38;
const MARGIN      = 28;
const CANVAS_SIZE = MARGIN * 2 + CELL * (BOARD_SIZE - 1);
const STONE_R     = CELL * 0.44;
const SLOTS       = 20;
const SLOT_PREFIX = 'omok-battle-slot-';
const TURN_TIME   = 60; // 초

let myNickname    = '플레이어';
let oppNickname   = '상대방';
let myColor       = null;
let myTurn        = false;
let board         = [];
let lastMove      = null;
let gameOver      = false;
let winLine       = null;
let forbiddenCache = new Map();

// 타이머
let myTime        = TURN_TIME;
let oppTime       = TURN_TIME;
let timerInterval = null;

let peer          = null;
let conn          = null;
let isHost        = false;
let currentSlot   = 0;
let matchingTimer = null;
let raindrops     = [];
let confettiPieces= [];

// ════════════════════════════════════════════════════════════
//  햅틱
// ════════════════════════════════════════════════════════════
function haptic(pattern) {
    if (navigator.vibrate) navigator.vibrate(pattern);
}

// ════════════════════════════════════════════════════════════
//  화면 전환
// ════════════════════════════════════════════════════════════
function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById('screen-' + id).classList.add('active');
}

// ════════════════════════════════════════════════════════════
//  로비
// ════════════════════════════════════════════════════════════
document.getElementById('nickname-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') startMatching();
});

function startMatching() {
    const input = document.getElementById('nickname-input').value.trim();
    myNickname = input || '플레이어';
    showScreen('matching');
    trySlot(1);
}

// ════════════════════════════════════════════════════════════
//  매칭 — 슬롯 기반
// ════════════════════════════════════════════════════════════
function trySlot(slot) {
    if (slot > SLOTS) slot = 1;
    currentSlot = slot;
    const slotId = SLOT_PREFIX + String(slot).padStart(2, '0');
    document.getElementById('matching-slot-info').textContent = `대기실 ${slot}번 확인 중...`;

    if (peer) { peer.destroy(); peer = null; }

    peer = new Peer(slotId, { debug: 0 });

    peer.on('open', () => {
        isHost = true;
        document.getElementById('matching-slot-info').textContent = `대기실 ${slot}번에서 대기 중`;
        peer.on('connection', (c) => {
            conn = c;
            setupConn();
            conn.on('open', () => conn.send({ type: 'hello', nickname: myNickname }));
        });
        matchingTimer = setTimeout(() => trySlot(slot + 1), 30000);
    });

    peer.on('error', (err) => {
        if (err.type === 'unavailable-id') tryConnect(slot);
        else trySlot(slot + 1);
    });
}

function tryConnect(slot) {
    const slotId = SLOT_PREFIX + String(slot).padStart(2, '0');
    document.getElementById('matching-slot-info').textContent = `대기실 ${slot}번 연결 중...`;

    if (peer) { peer.destroy(); peer = null; }
    peer = new Peer(undefined, { debug: 0 });

    peer.on('open', () => {
        isHost = false;
        conn = peer.connect(slotId, { reliable: true });
        conn.on('open', () => conn.send({ type: 'hello', nickname: myNickname }));
        conn.on('error', () => trySlot(slot + 1));
        setupConn();
        matchingTimer = setTimeout(() => trySlot(slot + 1), 5000);
    });

    peer.on('error', () => trySlot(slot + 1));
}

function cancelMatching() {
    clearTimeout(matchingTimer);
    if (peer) { peer.destroy(); peer = null; }
    conn = null;
    showScreen('lobby');
}

// ════════════════════════════════════════════════════════════
//  P2P 연결 설정
// ════════════════════════════════════════════════════════════
function setupConn() {
    conn.on('data', handleData);
    conn.on('close', handleDisconnect);
    conn.on('error', handleDisconnect);
}

function handleData(data) {
    switch (data.type) {
        case 'hello':
            clearTimeout(matchingTimer);
            oppNickname = data.nickname;
            onMatched();
            break;
        case 'coin':
            onReceiveCoin(data.hostIsBlack);
            break;
        case 'move':
            onReceiveMove(data.r, data.c);
            break;
        case 'resign':
            if (!gameOver) {
                gameOver = true;
                stopTimer();
                showResult(true, '상대방이 항복했습니다');
            }
            break;
        case 'timeout':
            if (!gameOver) {
                gameOver = true;
                stopTimer();
                showResult(true, '상대방 시간 초과');
            }
            break;
        case 'rematch-req':
            showRematchModal();
            break;
        case 'rematch-acc':
            startRematch();
            break;
        case 'rematch-dec':
            document.getElementById('rematch-status').textContent = '상대방이 거절했습니다.';
            document.getElementById('btn-rematch').disabled = false;
            setTimeout(backToLobby, 1500);
            break;
    }
}

function handleDisconnect() {
    if (gameOver) return;
    stopTimer();
    alert('상대방의 연결이 끊어졌습니다.');
    backToLobby();
}

// ════════════════════════════════════════════════════════════
//  매칭 완료
// ════════════════════════════════════════════════════════════
function onMatched() {
    document.getElementById('matched-opponent-name').textContent = `👤 ${oppNickname}`;
    showScreen('matched');
    haptic(50);

    let n = 3;
    document.getElementById('countdown-text').textContent = `${n}초 후 선공 결정을 시작합니다`;
    const iv = setInterval(() => {
        n--;
        if (n > 0) {
            document.getElementById('countdown-text').textContent = `${n}초 후 선공 결정을 시작합니다`;
        } else {
            clearInterval(iv);
            startCoinFlip();
        }
    }, 1000);
}

// ════════════════════════════════════════════════════════════
//  동전 던지기
// ════════════════════════════════════════════════════════════
function startCoinFlip() {
    showScreen('coin');

    if (isHost) {
        setTimeout(() => {
            const hostIsBlack = Math.random() < 0.5;
            if (conn && conn.open) conn.send({ type: 'coin', hostIsBlack });
            animateCoin(hostIsBlack ? 'black' : 'white', () => {
                myColor = hostIsBlack ? 'black' : 'white';
                showCoinResult(hostIsBlack);
            });
        }, 800);
    }
}

function onReceiveCoin(hostIsBlack) {
    const myIsBlack = !hostIsBlack;
    animateCoin(myIsBlack ? 'black' : 'white', () => {
        myColor = myIsBlack ? 'black' : 'white';
        showCoinResult(myIsBlack);
    });
}

function animateCoin(result, cb) {
    const coin = document.getElementById('coin');
    document.getElementById('coin-waiting').classList.remove('hidden');
    document.getElementById('coin-result').classList.add('hidden');

    const finalRot = result === 'black' ? 1440 : 1620;
    coin.style.setProperty('--final-rot', finalRot + 'deg');
    coin.classList.remove('flipping');
    void coin.offsetWidth;
    coin.classList.add('flipping');
    haptic([30, 50, 30, 50, 80]);

    setTimeout(() => {
        document.getElementById('coin-waiting').classList.add('hidden');
        cb();
    }, 2400);
}

function showCoinResult(iAmBlack) {
    document.getElementById('coin-result').classList.remove('hidden');
    if (iAmBlack) {
        document.getElementById('coin-result-text').textContent = '⚫ 선공입니다!';
        document.getElementById('coin-result-sub').textContent = '당신이 흑돌로 먼저 시작합니다';
    } else {
        document.getElementById('coin-result-text').textContent = '⚪ 후공입니다';
        document.getElementById('coin-result-sub').textContent = '상대방이 흑돌로 먼저 시작합니다';
    }
    setTimeout(() => startGame(), 2200);
}

// ════════════════════════════════════════════════════════════
//  게임 시작
// ════════════════════════════════════════════════════════════
function startGame() {
    board    = Array.from({length: BOARD_SIZE}, () => Array(BOARD_SIZE).fill(0));
    lastMove = null;
    gameOver = false;
    winLine  = null;
    forbiddenCache = new Map();
    myTurn   = (myColor === 'black');
    myTime   = TURN_TIME;
    oppTime  = TURN_TIME;

    setupBoard();
    updatePlayerInfo();
    showScreen('game');
    renderBoard();
    startTimer();
}

function setupBoard() {
    const canvas = document.getElementById('board-canvas');
    canvas.width  = CANVAS_SIZE;
    canvas.height = CANVAS_SIZE;
    canvas.style.width  = CANVAS_SIZE + 'px';
    canvas.style.height = CANVAS_SIZE + 'px';
    canvas.onclick = onBoardClick;
}

function updatePlayerInfo() {
    const myIsBlack = myColor === 'black';

    document.getElementById('my-stone-icon').style.background = myIsBlack ? '#111' : '#f0f0f0';
    document.getElementById('my-stone-icon').style.border = myIsBlack ? '1px solid #444' : '2px solid #999';
    document.getElementById('my-name-display').textContent = myNickname;

    document.getElementById('opp-stone-icon').style.background = myIsBlack ? '#f0f0f0' : '#111';
    document.getElementById('opp-stone-icon').style.border = myIsBlack ? '2px solid #999' : '1px solid #444';
    document.getElementById('opp-name-display').textContent = oppNickname;

    updateTimerDisplay();
    updateTurnDisplay();
}

function updateTurnDisplay() {
    const myBadge  = document.getElementById('my-turn-badge');
    const oppBadge = document.getElementById('opp-turn-badge');
    const turnInfo = document.getElementById('turn-info');

    if (gameOver) {
        myBadge.classList.add('hidden');
        oppBadge.classList.add('hidden');
        turnInfo.textContent = '게임 종료';
        return;
    }

    if (myTurn) {
        myBadge.classList.remove('hidden');
        oppBadge.classList.add('hidden');
        turnInfo.textContent = '내 차례 ●';
    } else {
        myBadge.classList.add('hidden');
        oppBadge.classList.remove('hidden');
        turnInfo.textContent = `${oppNickname}의 차례`;
    }
}

// ════════════════════════════════════════════════════════════
//  타이머
// ════════════════════════════════════════════════════════════
function startTimer() {
    stopTimer();
    timerInterval = setInterval(() => {
        if (gameOver) { stopTimer(); return; }

        if (myTurn) {
            myTime = Math.max(0, myTime - 1);
            if (myTime === 0) {
                stopTimer();
                gameOver = true;
                updateTimerDisplay();
                if (conn && conn.open) conn.send({ type: 'timeout' });
                haptic([200, 100, 200]);
                setTimeout(() => showResult(false, '시간 초과'), 300);
                return;
            }
        } else {
            oppTime = Math.max(0, oppTime - 1);
            if (oppTime === 0) {
                stopTimer();
                gameOver = true;
                updateTimerDisplay();
                setTimeout(() => showResult(true, '상대방 시간 초과'), 300);
                return;
            }
        }
        updateTimerDisplay();
    }, 1000);
}

function stopTimer() {
    clearInterval(timerInterval);
    timerInterval = null;
}

function handOffTurn(nextTurnIsMine) {
    myTurn = nextTurnIsMine;
    if (nextTurnIsMine) myTime = TURN_TIME;
    else oppTime = TURN_TIME;
    updateTimerDisplay();
}

function updateTimerDisplay() {
    const fmt = s => `${Math.floor(s / 60)}:${String(s % 60).padStart(2, '0')}`;

    const myEl  = document.getElementById('my-timer');
    const oppEl = document.getElementById('opp-timer');
    const myBar  = document.getElementById('my-timer-bar');
    const oppBar = document.getElementById('opp-timer-bar');

    myEl.textContent  = fmt(myTime);
    oppEl.textContent = fmt(oppTime);

    const myPct  = (myTime  / TURN_TIME) * 100;
    const oppPct = (oppTime / TURN_TIME) * 100;

    myBar.style.width  = myPct  + '%';
    oppBar.style.width = oppPct + '%';

    // 색상: 10초 이하 빨강, 30초 이하 주황, 그 외 초록
    const barColor = pct => pct <= 16 ? '#f87171' : pct <= 50 ? '#fb923c' : '#4ade80';
    myBar.style.backgroundColor  = barColor(myPct);
    oppBar.style.backgroundColor = barColor(oppPct);

    // 텍스트 색상
    myEl.className  = `font-mono text-xs font-bold ${myTime  <= 10 ? 'text-red-400 timer-urgent' : 'text-white'}`;
    oppEl.className = `font-mono text-xs font-bold ${oppTime <= 10 ? 'text-red-400 timer-urgent' : 'text-white'}`;
}

// ════════════════════════════════════════════════════════════
//  항복
// ════════════════════════════════════════════════════════════
function resign() {
    if (gameOver) return;
    document.getElementById('modal-resign').classList.remove('hidden');
    haptic(30);
}

function closeResignModal() {
    document.getElementById('modal-resign').classList.add('hidden');
}

function confirmResign() {
    document.getElementById('modal-resign').classList.add('hidden');
    if (gameOver) return;
    gameOver = true;
    stopTimer();
    if (conn && conn.open) conn.send({ type: 'resign' });
    haptic([100, 50, 100]);
    showResult(false, '항복');
}

// ════════════════════════════════════════════════════════════
//  오목판 렌더링
// ════════════════════════════════════════════════════════════
function renderBoard() {
    const canvas = document.getElementById('board-canvas');
    const ctx    = canvas.getContext('2d');
    ctx.clearRect(0, 0, CANVAS_SIZE, CANVAS_SIZE);

    // 배경
    ctx.fillStyle = '#c8934a';
    ctx.fillRect(0, 0, CANVAS_SIZE, CANVAS_SIZE);

    // 격자
    ctx.strokeStyle = '#8B5E2A';
    ctx.lineWidth = 1;
    for (let i = 0; i < BOARD_SIZE; i++) {
        const x = MARGIN + i * CELL;
        const y = MARGIN + i * CELL;
        ctx.beginPath(); ctx.moveTo(x, MARGIN); ctx.lineTo(x, MARGIN + (BOARD_SIZE-1)*CELL); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(MARGIN, y); ctx.lineTo(MARGIN + (BOARD_SIZE-1)*CELL, y); ctx.stroke();
    }

    // 화점
    const stars = [3, 7, 11];
    ctx.fillStyle = '#6B4320';
    stars.forEach(r => stars.forEach(c => {
        ctx.beginPath(); ctx.arc(MARGIN + c*CELL, MARGIN + r*CELL, 4, 0, Math.PI*2); ctx.fill();
    }));
    ctx.beginPath(); ctx.arc(MARGIN + 7*CELL, MARGIN + 7*CELL, 4, 0, Math.PI*2); ctx.fill();

    // 좌표 레이블
    ctx.fillStyle = '#6B4320';
    ctx.font = '11px monospace';
    ctx.textAlign = 'center';
    const cols = 'ABCDEFGHJKLMNOP';
    for (let i = 0; i < BOARD_SIZE; i++) {
        ctx.fillText(cols[i], MARGIN + i*CELL, MARGIN - 10);
        ctx.fillText(cols[i], MARGIN + i*CELL, MARGIN + (BOARD_SIZE-1)*CELL + 18);
    }
    ctx.textAlign = 'right';
    for (let i = 0; i < BOARD_SIZE; i++) {
        ctx.fillText(BOARD_SIZE - i, MARGIN - 8, MARGIN + i*CELL + 4);
    }

    // 승리 라인
    if (winLine) {
        ctx.strokeStyle = 'rgba(255,220,0,0.85)';
        ctx.lineWidth = 7; ctx.lineCap = 'round';
        ctx.beginPath();
        ctx.moveTo(MARGIN + winLine[0].c*CELL, MARGIN + winLine[0].r*CELL);
        for (let k = 1; k < winLine.length; k++)
            ctx.lineTo(MARGIN + winLine[k].c*CELL, MARGIN + winLine[k].r*CELL);
        ctx.stroke(); ctx.lineWidth = 1;
    }

    // 돌
    for (let r = 0; r < BOARD_SIZE; r++)
        for (let c = 0; c < BOARD_SIZE; c++)
            if (board[r][c]) drawStone(ctx, r, c, board[r][c]);

    // 마지막 수 표시
    if (lastMove) {
        const color = board[lastMove.r][lastMove.c];
        ctx.fillStyle = color === 1 ? 'rgba(255,255,255,0.7)' : 'rgba(0,0,0,0.5)';
        ctx.beginPath();
        ctx.arc(MARGIN + lastMove.c*CELL, MARGIN + lastMove.r*CELL, 5, 0, Math.PI*2);
        ctx.fill();
    }

    // 금수 표시: 흑 플레이어는 항상 표시 (상대 차례에도 다음 수 계획을 위해)
    // myTurn 조건을 제거 — myTurn 때문에 착수 후 X가 사라지는 버그의 근본 원인이었음
    if (!gameOver && myColor === 'black') {
        drawForbidden(ctx);
    }
}

function drawStone(ctx, r, c, color) {
    const x = MARGIN + c * CELL;
    const y = MARGIN + r * CELL;
    const gr = ctx.createRadialGradient(x - STONE_R*0.3, y - STONE_R*0.3, STONE_R*0.1, x, y, STONE_R);

    if (color === 1) {
        gr.addColorStop(0, '#555'); gr.addColorStop(1, '#000');
    } else {
        gr.addColorStop(0, '#fff'); gr.addColorStop(1, '#ccc');
    }

    ctx.beginPath(); ctx.arc(x, y, STONE_R, 0, Math.PI*2);
    ctx.fillStyle = gr; ctx.fill();
    if (color === 2) { ctx.strokeStyle = '#aaa'; ctx.lineWidth = 1; ctx.stroke(); }
}

function drawForbidden(ctx) {
    for (let r = 0; r < BOARD_SIZE; r++) {
        for (let c = 0; c < BOARD_SIZE; c++) {
            if (board[r][c] === 0 && isForbidden(r, c)) {
                const x = MARGIN + c*CELL, y = MARGIN + r*CELL;
                ctx.strokeStyle = 'rgba(255,60,60,0.85)';
                ctx.lineWidth = 2;
                const s = STONE_R * 0.6;
                ctx.beginPath(); ctx.moveTo(x-s, y-s); ctx.lineTo(x+s, y+s); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(x+s, y-s); ctx.lineTo(x-s, y+s); ctx.stroke();
            }
        }
    }
}

// ════════════════════════════════════════════════════════════
//  클릭 처리
// ════════════════════════════════════════════════════════════
function onBoardClick(e) {
    if (!myTurn || gameOver) return;

    const canvas = document.getElementById('board-canvas');
    const rect   = canvas.getBoundingClientRect();
    const px = (e.clientX - rect.left) * (CANVAS_SIZE / rect.width);
    const py = (e.clientY - rect.top)  * (CANVAS_SIZE / rect.height);

    const c = Math.round((px - MARGIN) / CELL);
    const r = Math.round((py - MARGIN) / CELL);

    if (r < 0 || r >= BOARD_SIZE || c < 0 || c >= BOARD_SIZE) return;
    if (board[r][c] !== 0) return;

    const colorNum = myColor === 'black' ? 1 : 2;

    if (colorNum === 1 && isForbidden(r, c)) {
        haptic([50, 30, 50]); // 금수 햅틱
        document.getElementById('game-status-text').textContent = '⛔ 금수! 그 곳에는 착수할 수 없습니다.';
        setTimeout(() => {
            document.getElementById('game-status-text').textContent = '게임 진행 중';
        }, 1500);
        return;
    }

    // ★ turn을 먼저 내려야 renderBoard에서 금수 X가 안 보임
    handOffTurn(false);
    placeMove(r, c, colorNum);
    if (conn && conn.open) conn.send({ type: 'move', r, c });
}

function placeMove(r, c, colorNum) {
    board[r][c] = colorNum;
    lastMove = {r, c};
    forbiddenCache.clear();
    haptic(30); // 착수 햅틱

    const won = checkWin(r, c, colorNum);
    if (won) {
        winLine  = won;
        gameOver = true;
        stopTimer();
        renderBoard();
        updateTurnDisplay();
        const iWon = (colorNum === (myColor === 'black' ? 1 : 2));
        if (iWon) haptic([100, 50, 100, 50, 200]);
        else      haptic([400]);
        setTimeout(() => showResult(iWon), 600);
    } else {
        renderBoard();
        updateTurnDisplay();
    }
}

function onReceiveMove(r, c) {
    const colorNum = myColor === 'black' ? 2 : 1;
    // ★ turn을 먼저 올려야 renderBoard에서 금수 X가 보임
    handOffTurn(true);
    placeMove(r, c, colorNum);
}

// ════════════════════════════════════════════════════════════
//  승리 체크
// ════════════════════════════════════════════════════════════
const DIRS = [[0,1],[1,0],[1,1],[1,-1]];

function countDir(r, c, dr, dc, color) {
    let cnt = 0, cells = [];
    for (let i = 1; i <= 5; i++) {
        const nr = r + dr*i, nc = c + dc*i;
        if (nr<0||nr>=BOARD_SIZE||nc<0||nc>=BOARD_SIZE||board[nr][nc]!==color) break;
        cnt++; cells.push({r:nr, c:nc});
    }
    return {cnt, cells};
}

function checkWin(r, c, color) {
    for (const [dr, dc] of DIRS) {
        const fwd = countDir(r, c,  dr,  dc, color);
        const bwd = countDir(r, c, -dr, -dc, color);
        const total = 1 + fwd.cnt + bwd.cnt;
        if (color === 2 && total >= 5)
            return [{r,c}, ...fwd.cells.slice(0,4), ...bwd.cells.slice(0,4)].slice(0,5);
        if (color === 1 && total === 5)
            return [...bwd.cells.slice().reverse(), {r,c}, ...fwd.cells].slice(0,5);
    }
    return null;
}

// ════════════════════════════════════════════════════════════
//  렌주룰 — 금수 판정
// ════════════════════════════════════════════════════════════
function isForbidden(r, c) {
    const key = `${r},${c}`;
    if (forbiddenCache.has(key)) return forbiddenCache.get(key);

    board[r][c] = 1;
    const result = isForbiddenAfterPlacement(r, c, 0);
    board[r][c] = 0;
    forbiddenCache.set(key, result);
    return result;
}

function isForbiddenAfterPlacement(r, c, depth) {
    if (isOverline(r, c)) return true;
    if (isExactFive(r, c)) return false;
    if (isDoubleFour(r, c)) return true;
    if (isDoubleThree(r, c, depth)) return true;
    return false;
}

function isLegalBlackMove(r, c, depth) {
    if (!isCellEmpty(r, c)) return false;
    board[r][c] = 1;
    const legal = !isForbiddenAfterPlacement(r, c, depth + 1);
    board[r][c] = 0;
    return legal;
}

function isOverline(r, c) {
    for (const [dr, dc] of DIRS) {
        const fwd = countDir(r, c,  dr,  dc, 1);
        const bwd = countDir(r, c, -dr, -dc, 1);
        if (1 + fwd.cnt + bwd.cnt >= 6) return true;
    }
    return false;
}

function isExactFive(r, c) {
    for (const [dr, dc] of DIRS) {
        const fwd = countDir(r, c,  dr,  dc, 1);
        const bwd = countDir(r, c, -dr, -dc, 1);
        if (1 + fwd.cnt + bwd.cnt === 5) return true;
    }
    return false;
}

// getLineCount: 한 방향(양방향)으로 연속된 같은 색 돌 수 카운트
function getLineCount(r, c, dr, dc, color) {
    let cnt = 1;
    for (let d = 1; d <= 5; d++) {
        const nr=r+dr*d, nc=c+dc*d;
        if (nr<0||nr>=BOARD_SIZE||nc<0||nc>=BOARD_SIZE) break;
        if (board[nr][nc] === color) cnt++; else break;
    }
    for (let d = 1; d <= 5; d++) {
        const nr=r-dr*d, nc=c-dc*d;
        if (nr<0||nr>=BOARD_SIZE||nc<0||nc>=BOARD_SIZE) break;
        if (board[nr][nc] === color) cnt++; else break;
    }
    return cnt;
}

// 셀이 보드 내부이고 비어 있는지 확인
function isCellEmpty(r, c) {
    if (r < 0 || r >= BOARD_SIZE || c < 0 || c >= BOARD_SIZE) return false;
    return board[r][c] === 0;
}

// ── 쌍사 판정 ──────────────────────────────────────────────────────────────
// 방향 [dr,dc]에서 (r,c)가 "사(4)"의 일부인지 확인
// 알고리즘: 5칸 윈도우를 슬라이딩하며 흑4+빈1 조합 탐색
//   → 빈 칸을 채웠을 때 정확히 5목이 되어야만 유효한 "사"
//   (장목 방지: 6목 이상이 되면 제외)
// 이 방식은 연속사(XXXX_)뿐 아니라 갭사(XX_XX, XXX_X 등)도 모두 감지
function isFourInDir(r, c, dr, dc) {
    for (let k = 0; k <= 4; k++) {
        const r0 = r - k*dr, c0 = c - k*dc;
        const r4 = r0 + 4*dr, c4 = c0 + 4*dc;
        if (r0 < 0 || r0 >= BOARD_SIZE || c0 < 0 || c0 >= BOARD_SIZE) continue;
        if (r4 < 0 || r4 >= BOARD_SIZE || c4 < 0 || c4 >= BOARD_SIZE) continue;

        let blacks = 0, emptyR = -1, emptyC = -1, valid = true;
        for (let i = 0; i <= 4; i++) {
            const ri = r0 + i*dr, ci = c0 + i*dc;
            const v = board[ri][ci];
            if (v === 1) blacks++;
            else if (v === 0) {
                if (emptyR !== -1) { valid = false; break; } // 빈 칸 2개 이상 → 사 아님
                emptyR = ri; emptyC = ci;
            } else { valid = false; break; } // 백돌·벽 → 사 아님
        }
        if (!valid || blacks !== 4) continue;

        // 빈 칸을 채웠을 때 정확히 5목인지 검증 (6목 이상이면 사가 아님)
        board[emptyR][emptyC] = 1;
        const len = getLineCount(emptyR, emptyC, dr, dc, 1);
        board[emptyR][emptyC] = 0;
        if (len === 5) return true;
    }
    return false;
}

function isDoubleFour(r, c) {
    let fours = 0;
    for (const [dr, dc] of DIRS) if (isFourInDir(r, c, dr, dc)) fours++;
    return fours >= 2;
}

// ── 쌍삼 판정 ──────────────────────────────────────────────────────────────
// 렌주룰의 "삼"은 단순 오픈 패턴이 아니라, 합법적인 다음 수로 열린 사(_XXXX_)를
// 만들 수 있는 살아 있는 삼만 인정한다.
function createsStraightFourInDir(anchorR, anchorC, moveR, moveC, dr, dc) {
    const moveOffset = dr !== 0 ? (moveR - anchorR) / dr : (moveC - anchorC) / dc;

    for (let start = -4; start <= 0; start++) {
        const anchorPos = -start;
        const movePos = moveOffset - start;
        if (anchorPos < 1 || anchorPos > 4 || movePos < 1 || movePos > 4) continue;

        const r0 = anchorR + start * dr;
        const c0 = anchorC + start * dc;
        const r5 = r0 + 5 * dr;
        const c5 = c0 + 5 * dc;
        if (!isCellEmpty(r0, c0) || !isCellEmpty(r5, c5)) continue;

        let valid = true;
        for (let i = 1; i <= 4; i++) {
            const ri = r0 + i * dr;
            const ci = c0 + i * dc;
            if (ri < 0 || ri >= BOARD_SIZE || ci < 0 || ci >= BOARD_SIZE || board[ri][ci] !== 1) {
                valid = false;
                break;
            }
        }
        if (valid) return true;
    }
    return false;
}

function isLiveThreeInDir(r, c, dr, dc, depth) {
    for (let offset = -4; offset <= 4; offset++) {
        if (offset === 0) continue;

        const nr = r + offset * dr;
        const nc = c + offset * dc;
        if (!isCellEmpty(nr, nc)) continue;

        board[nr][nc] = 1;
        const makesStraightFour = createsStraightFourInDir(r, c, nr, nc, dr, dc);
        board[nr][nc] = 0;

        if (makesStraightFour && isLegalBlackMove(nr, nc, depth)) return true;
    }
    return false;
}

function isDoubleThree(r, c, depth = 0) {
    let threes = 0;
    for (const [dr, dc] of DIRS) {
        if (isLiveThreeInDir(r, c, dr, dc, depth)) threes++;
        if (threes >= 2) return true;
    }
    return threes >= 2;
}

// ════════════════════════════════════════════════════════════
//  결과 화면
// ════════════════════════════════════════════════════════════
function showResult(iWon, reason) {
    stopTimer();
    clearAnimations();
    document.getElementById('result-banner').classList.remove('banner-pop');
    void document.getElementById('result-banner').offsetWidth;
    document.getElementById('result-banner').classList.add('banner-pop');

    if (iWon) {
        document.getElementById('result-emoji').textContent = '🏆';
        document.getElementById('result-title').innerHTML = '<span class="text-yellow-400">승리!</span>';
        document.getElementById('result-sub').textContent = reason || '훌륭한 대국이었습니다!';
        startConfetti();
    } else {
        document.getElementById('result-emoji').textContent = '😔';
        document.getElementById('result-title').innerHTML = '<span class="text-slate-400">패배</span>';
        document.getElementById('result-sub').textContent = reason || '다음엔 꼭 이겨보세요!';
        startRain();
    }

    document.getElementById('rematch-status').textContent = '';
    document.getElementById('btn-rematch').disabled = false;
    showScreen('result');
}

// ════════════════════════════════════════════════════════════
//  폭죽 / 빗방울
// ════════════════════════════════════════════════════════════
function startConfetti() {
    const colors = ['#ff4444','#ffcc00','#44ff44','#4488ff','#ff44ff','#44ffff','#ff8800'];
    for (let i = 0; i < 120; i++) {
        setTimeout(() => {
            const el = document.createElement('div');
            el.className = 'confetti-piece';
            el.style.left = Math.random() * 100 + 'vw';
            el.style.background = colors[Math.floor(Math.random()*colors.length)];
            el.style.width  = (6 + Math.random()*8) + 'px';
            el.style.height = (6 + Math.random()*8) + 'px';
            el.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
            el.style.animationDuration = (2 + Math.random()*2.5) + 's';
            el.style.animationDelay = '0s';
            document.body.appendChild(el);
            confettiPieces.push(el);
            el.addEventListener('animationend', () => el.remove());
        }, i * 30);
    }
}

function startRain() {
    for (let i = 0; i < 60; i++) {
        const el = document.createElement('div');
        el.className = 'raindrop';
        el.style.left = Math.random() * 100 + 'vw';
        el.style.height = (20 + Math.random() * 40) + 'px';
        el.style.animationDuration  = (0.5 + Math.random()*0.5) + 's';
        el.style.animationDelay     = (Math.random()*2) + 's';
        document.body.appendChild(el);
        raindrops.push(el);
    }
}

function clearAnimations() {
    confettiPieces.forEach(el => el.remove()); confettiPieces = [];
    raindrops.forEach(el => el.remove()); raindrops = [];
}

// ════════════════════════════════════════════════════════════
//  재시합
// ════════════════════════════════════════════════════════════
function requestRematch() {
    if (conn && conn.open) {
        conn.send({ type: 'rematch-req' });
        document.getElementById('rematch-status').textContent = '재시합 요청 중...';
        document.getElementById('btn-rematch').disabled = true;
    }
}

function showRematchModal() {
    document.getElementById('rematch-requester').textContent =
        `${oppNickname}이(가) 재시합을 요청했습니다.`;
    document.getElementById('modal-rematch').classList.remove('hidden');
}

function acceptRematch() {
    document.getElementById('modal-rematch').classList.add('hidden');
    if (conn && conn.open) conn.send({ type: 'rematch-acc' });
    startRematch();
}

function declineRematch() {
    document.getElementById('modal-rematch').classList.add('hidden');
    if (conn && conn.open) conn.send({ type: 'rematch-dec' });
    backToLobby();
}

function startRematch() {
    clearAnimations();
    stopTimer();
    showScreen('coin');
    document.getElementById('coin-result').classList.add('hidden');
    document.getElementById('coin-waiting').classList.remove('hidden');
    document.getElementById('coin').classList.remove('flipping');

    if (isHost) {
        setTimeout(() => {
            const hostIsBlack = Math.random() < 0.5;
            if (conn && conn.open) conn.send({ type: 'coin', hostIsBlack });
            animateCoin(hostIsBlack ? 'black' : 'white', () => {
                myColor = hostIsBlack ? 'black' : 'white';
                showCoinResult(hostIsBlack);
            });
        }, 600);
    }
}

function backToLobby() {
    clearAnimations();
    stopTimer();
    document.getElementById('modal-rematch').classList.add('hidden');
    document.getElementById('modal-resign').classList.add('hidden');
    gameOver = true;
    if (peer) { peer.destroy(); peer = null; }
    conn = null;
    showScreen('lobby');
}
</script>
</body>
